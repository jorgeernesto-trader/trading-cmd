<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trading CMD">
  <meta name="theme-color" content="#F0A500">
  <title>Trading CMD v3</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080B14; font-family: 'Courier New', monospace; }
    #root { min-height: 100vh; }
    select option { background: #0D1321; color: #E8EAF0; }
    textarea::placeholder { color: #2D3748; }
    input:focus, select:focus, textarea:focus { border-color: #F0A500 !important; outline: none; }
    button:hover:not(:disabled) { opacity: .85; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    input[type=checkbox] { accent-color: #F0A500; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #080B14; }
    ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── INDICADORES ─────────────────────────────────────────────────────────
    const ema = (d, p) => { const k = 2/(p+1); return d.reduce((a,v,i) => { a.push(i===0 ? v : v*k+a[i-1]*(1-k)); return a; }, []); };
    const rsi = (c, p=14) => { if(c.length<p+1) return c.map(()=>50); const r=new Array(p).fill(50); let ag=0,al=0; for(let i=1;i<=p;i++){const d=c[i]-c[i-1];ag+=d>0?d:0;al+=d<0?-d:0;} ag/=p;al/=p; r.push(al===0?100:100-100/(1+ag/al)); for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?-d:0))/p;r.push(al===0?100:100-100/(1+ag/al));} return r; };
    const atr = (cs, p=14) => { if(cs.length<2) return 0; const trs=cs.slice(1).map((c,i)=>Math.max(c.h-c.l,Math.abs(c.h-cs[i].c),Math.abs(c.l-cs[i].c))); let a=trs.slice(0,p).reduce((s,v)=>s+v,0)/Math.min(p,trs.length); trs.slice(p).forEach(t=>{a=(a*(p-1)+t)/p;}); return a; };

    // ─── API CRYPTO.COM DIRECTA ───────────────────────────────────────────────
    const fetchC = async (pair, tf, count=100) => {
      const exactTf = tf === "1H" ? "1h" : tf === "4H" ? "4h" : tf === "1D" ? "1D" : tf;
      const cleanPair = pair.trim();
      const r = await fetch(`https://api.crypto.com/exchange/v1/public/get-candlestick?instrument_name=${cleanPair}_USDT&timeframe=${exactTf}&count=${Math.min(count,300)}`);
      const d = await r.json();
      if (d.code !== 0) throw new Error(d.message || "API error");
      return d.result.data.map(c => ({t:+c.t,o:+c.o,h:+c.h,l:+c.l,c:+c.c,v:+(c.v||0)})).sort((a,b)=>a.t-b.t);
    };
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    const fetchPrice = async (pair) => {
      const r = await fetch(`https://api.crypto.com/exchange/v1/public/get-ticker?instrument_name=${pair}_USDT`);
      const d = await r.json();
      return +d.result.data.a;
    };

    // ─── PARSER ───────────────────────────────────────────────────────────────
    const BTC_STATES = ["TENDENCIA ALCISTA","TENDENCIA BAJISTA","RECUPERACIÓN","DISTRIBUCIÓN","AMBIGUO"];

    const parseBtcState = (b) => {
      for (const s of BTC_STATES) { if (b.includes(s)) return s; }
      if (b.includes("BTC: Bajista") || b.includes("bajo EMA200")) return "TENDENCIA BAJISTA";
      if (b.includes("BTC: Alcista") || b.includes("sobre EMA200")) return "TENDENCIA ALCISTA";
      return null;
    };

    const parseConditions = (b) => {
      // Extrae condiciones separadas por bloque LONG/SHORT
      const condLong=[], condShort=[];
      const lines = b.split("\n");
      let section=null;
      for (const l of lines) {
        const lt = l.trim();
        if (/LONG/i.test(lt) && lt.length < 40) { section="LONG"; continue; }
        if (/SHORT/i.test(lt) && lt.length < 40) { section="SHORT"; continue; }
        if (lt.includes("•") || lt.match(/^[✅❌➡️⚠️]/u)) {
          const clean = lt.replace(/^[•✅❌➡️⚠️\s]+/u,"").trim();
          if (!clean) continue;
          if (section==="LONG") condLong.push(clean);
          else if (section==="SHORT") condShort.push(clean);
        }
      }
      // Fallback: si no hay secciones separadas, todas van al bloque del mensaje
      if (!condLong.length && !condShort.length) {
        let inC=false;
        for (const l of lines) {
          if(l.includes("Cumplidas")) inC=true;
          if(l.includes("Pendientes")) inC=false;
          if(inC && l.includes("•")) {
            const clean = l.trim().replace(/^•\s*/,"");
            if (clean) condLong.push(clean);
          }
        }
      }
      return { condLong, condShort };
    };

    const parseMessages = (raw) => {
      const signals = [];
      const blocks = raw.split(/(?=(?:🟡|🔴|SHORT|LONG|👀|⚠️|📉))/g).filter(b => b.trim().length > 10);
      for (const block of blocks) {
        const b = block.trim();

        // ── FASE 1 ──────────────────────────────────────────────────────────
        if (b.includes("RSI VIGILANCIA") || (b.includes("FASE 1") && b.includes("RSI"))) {
          const pair = (b.match(/([A-Z]{2,10})USDT/)||[])[1];
          const rsiValue = parseFloat((b.match(/RSI[^\d]*([\d.]+)/)||[])[1]);
          const dir = b.includes("sobrecompra") ? "SHORT" : "LONG";
          const timeStr = (b.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2})/)||[])[1]||null;
          if (pair) signals.push({ type:"FASE1", pair, dir, rsiValue, timeStr, raw:b });
          continue;
        }

        // ── FASE 2 ──────────────────────────────────────────────────────────
        if (b.includes("RSI GIRANDO") || (b.includes("FASE 2") && b.includes("RSI"))) {
          const pair = (b.match(/([A-Z]{2,10})USDT/)||[])[1];
          const rsiVals = [...b.matchAll(/([\d.]+)/g)].map(m=>+m[1]).filter(v=>v>10&&v<100);
          const dir = rsiVals[0] > 50 ? "SHORT" : "LONG";
          const timeStr = (b.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2})/)||[])[1]||null;
          if (pair) signals.push({ type:"FASE2", pair, dir, rsiFrom:rsiVals[0], rsiTo:rsiVals[1], timeStr, raw:b });
          continue;
        }

        // ── FASE 3 ──────────────────────────────────────────────────────────
        if (b.includes("ALERTA RSI EXTREMO") || (b.includes("FASE 3") && b.includes("RSI"))) {
          const pair = (b.match(/([A-Z]{2,10})USDT/)||[])[1];
          const rsiMatch = b.match(/([\d.]+)\s*→\s*([\d.]+)/);
          const rsiFrom = rsiMatch ? +rsiMatch[1] : null;
          const rsiTo = rsiMatch ? +rsiMatch[2] : null;
          const peakMatch = b.match(/pico\s*([\d.]+)/);
          const rsiPeak = peakMatch ? +peakMatch[1] : rsiFrom;
          const dir = (rsiTo !== null && rsiTo < 50) ? "LONG" : "SHORT";
          const profundo = b.includes("PROFUNDO");
          const btcState = parseBtcState(b);
          const timeStr = (b.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2})/)||[])[1]||null;
          if (pair) signals.push({ type:"FASE3", pair, dir, rsiFrom, rsiTo, rsiPeak, profundo, btcState, timeStr, raw:b });
          continue;
        }

        // ── BMSB ────────────────────────────────────────────────────────────
        if (b.includes("BMSB") || b.includes("Bullmarket")) {
          const pair = (b.match(/([A-Z]{2,10})USDT/)||[])[1];
          const dir = b.includes("LONG") ? "LONG" : "SHORT";
          const banda = parseFloat((b.match(/Banda\s+(?:sup|inf)\s*[.:]\s*([\d.]+)/i)||[])[1]);
          const btcState = parseBtcState(b);
          const timeStr = (b.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2})/)||[])[1]||null;
          if (pair) signals.push({ type:"BMSB", pair, dir, banda, btcState, timeStr, raw:b });

        // ── ALERTA ESTÁNDAR ─────────────────────────────────────────────────
        } else if (b.includes("MEDIA") || b.includes("PRIORITARIA") || b.includes("Cumplidas")) {
          const pair = (b.match(/([A-Z]{2,10})USDT/)||[])[1];
          const priority = b.includes("PRIORITARIA") ? "PRIORITARIA" : "MEDIA";
          // Dirección: busca bloque con más condiciones, o detecta por texto
          let dir = "LONG";
          const longCount = (b.match(/LONG/gi)||[]).length;
          const shortCount = (b.match(/SHORT/gi)||[]).length;
          if (shortCount > longCount) dir = "SHORT";
          else if (b.includes("bajo EMA200") && !b.includes("BTC: Alcista")) dir = "SHORT";
          const cumplidas = parseInt((b.match(/Cumplidas.*?(\d+)\/4/)||[])[1]) || 0;
          const { condLong, condShort } = parseConditions(b);
          // Detección del número real de condiciones por lado
          const condLongN = parseInt((b.match(/LONG.*?\((\d+)\/4\)/s)||[])[1]) || condLong.length;
          const condShortN = parseInt((b.match(/SHORT.*?\((\d+)\/4\)/s)||[])[1]) || condShort.length;
          const btcState = parseBtcState(b);
          const timeStr = (b.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2})/)||[])[1]||null;
          if (pair) signals.push({ type:"ALERTA", pair, dir, priority, cumplidas, condLong, condShort, condLongN, condShortN, btcState, timeStr, raw:b });

        // ── SMT Pro ─────────────────────────────────────────────────────────
        } else if (b.includes("SMT Pro") || b.includes("BOS/CHoCH") || b.includes("CHoCH") || b.includes("Señal")) {
          const pair = (b.match(/([A-Z]{2,10})USDT/)||[])[1];
          const dir = b.includes("LONG") ? "LONG" : "SHORT";
          const entry = parseFloat((b.match(/Entrada\s*:\s*([\d.]+)/)||[])[1]);
          const tp1 = parseFloat((b.match(/TP1\s*:\s*([\d.]+)/)||[])[1]);
          const tp2 = parseFloat((b.match(/TP2\s*:\s*([\d.]+)/)||[])[1]);
          const tp3 = parseFloat((b.match(/TP3\s*:\s*([\d.]+)/)||[])[1]);
          const sl = parseFloat((b.match(/SL\s*:\s*([\d.]+)/)||[])[1]);
          const signal = (b.match(/Señal\s*:\s*(\w+)/)||[])[1] || "BOS";
          const btcState = parseBtcState(b);
          const timeStr = (b.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2})/)||[])[1]||null;
          if (pair && !isNaN(entry)) signals.push({ type:"SMT", pair, dir, entry, tp1, tp2, tp3, sl, signal, btcState, timeStr, raw:b });
        }
      }
      return signals;
    };

    // ─── HELPERS ──────────────────────────────────────────────────────────────
    // ─── RESUMEN PARA CLAUDE ──────────────────────────────────────────────────
    const buildResumen = (sig, result, capital, openPos, mode) => {
      const d = result.data;
      const now = new Date();

      // Tiempo transcurrido desde la señal
      let tiempoStr = "—";
      if (sig.timeStr) {
        try {
          const [dp,tp] = sig.timeStr.split(" ");
          const [dd,mm,yyyy] = dp.split("/");
          const sigMs = new Date(`${yyyy}-${mm}-${dd}T${tp}:00Z`).getTime();
          const diffMs = now.getTime() - sigMs;
          const hh = Math.floor(diffMs/3600000);
          const mn = Math.floor((diffMs%3600000)/60000);
          tiempoStr = hh > 0 ? `${hh}h ${mn}min` : `${mn}min`;
        } catch(e) { tiempoStr = "—"; }
      }

      // Condiciones bot
      const condL = sig.condLong && sig.condLong.length ? sig.condLong.join(", ") : "—";
      const condS = sig.condShort && sig.condShort.length ? sig.condShort.join(", ") : "—";
      const condLongN = sig.condLongN != null ? sig.condLongN : (sig.condLong ? sig.condLong.length : 0);
      const condShortN = sig.condShortN != null ? sig.condShortN : (sig.condShort ? sig.condShort.length : 0);

      // Estado BTC: prioridad al dato live del resultado
      const btcStateStr = d.btcState || sig.btcState || "—";

      // Avisos
      const avisoLines = result.avisos && result.avisos.length
        ? result.avisos.map(a => a.msg).join("\n")
        : "";

      const f6 = (n) => { if(n==null||isNaN(n)) return "—"; const d=n<0.01?6:n<1?4:n<100?4:2; return n.toFixed(d); };

      const lines = [
        "---RESUMEN PARA CLAUDE---",
        `Par: ${sig.pair}USDT`,
        `Tipo de señal: ${d.sigTypeLabel || sig.type}`,
        `Dirección sugerida por bot: ${sig.dir} (${sig.dir==="LONG"?condLongN:condShortN}/4 condiciones)`,
        `Condiciones LONG cumplidas: ${condL}`,
        `Condiciones SHORT cumplidas: ${condS}`,
        `Estado BTC 4H: ${btcStateStr}`,
        `BTC precio: ${d.btcPrice ? d.btcPrice.toFixed(0) : "—"} | EMA200: ${d.btcEma200 ? d.btcEma200.toFixed(0) : "—"}`,
        `Precio actual ${sig.pair}: ${f6(d.currentPrice)}`,
        `ATR 4H: ${f6(d.atr4H)} (${d.atrPct != null ? d.atrPct.toFixed(1) : "—"}% del precio)`,
        `EMA20: ${f6(d.ema20)} | EMA50: ${f6(d.ema50)} | EMA100: ${f6(d.ema100)} | EMA200: ${f6(d.ema200)}`,
        `RSI 4H actual: ${d.rsi4H != null ? d.rsi4H.toFixed(1) : "—"} ${d.rsiDir4H || ""}`,
        `Estado EMAs ${sig.pair}: ${d.emaState || "—"}`,
        `SL mínimo por ruido de mercado (1×ATR): ${f6(d.slRef)} — referencia para Claude`,
        `Hora de la señal: ${sig.timeStr || "—"}`,
        `Tiempo transcurrido desde la señal: ${tiempoStr}`,
        `Capital disponible: ${capital} USDT`,
        `Modo: ${mode}`,
        `Posiciones abiertas: ${openPos}`,
      ];
      if (avisoLines) lines.push(avisoLines);
      lines.push("---FIN RESUMEN---");
      return lines.join("\n");
    };

    // ─── ANÁLISIS UNIFICADO ──────────────────────────────────────────────────
    const analyzeSignal = async (sig, capital, openPos, mode) => {
      const btc4H = await fetchC("BTC","4h",200);
      await sleep(200);
      const pairStr = sig.pair === "BTC" ? "ETH" : sig.pair;
      const pair4H = await fetchC(pairStr,"4h",150);

      // ── BTC 4H ─────────────────────────────────────────────────────────────
      const btcC = btc4H.map(c=>c.c);
      const btcE200=ema(btcC,200).at(-1),btcE100=ema(btcC,100).at(-1),btcE50=ema(btcC,50).at(-1),btcE20=ema(btcC,20).at(-1);
      const btcPrice=btcC.at(-1);
      let btcState;
      const nearMM200=Math.abs(btcPrice-btcE200)/btcPrice*100<2;
      if(nearMM200){btcState="AMBIGUO";}
      else if(btcPrice>btcE200&&btcE20>btcE50&&btcE50>btcE100){btcState="TENDENCIA ALCISTA";}
      else if(btcPrice>btcE200&&btcE20<btcE50){btcState="RECUPERACIÓN";}
      else if(btcPrice<btcE200&&btcE20<btcE50){btcState="TENDENCIA BAJISTA";}
      else if(btcPrice<btcE200&&btcE20>btcE50){btcState="DISTRIBUCIÓN";}
      else{btcState="AMBIGUO";}

      // ── Par 4H ─────────────────────────────────────────────────────────────
      const p4C = pair4H.map(c=>c.c);
      const currentPrice = p4C.at(-1);
      const e20=ema(p4C,20).at(-1),e50=ema(p4C,50).at(-1),e100=ema(p4C,100).at(-1),e200=ema(p4C,200).at(-1);
      const rsiArr=rsi(p4C), rsi4H=rsiArr.at(-1), rsiDir4H=rsi4H>rsiArr.at(-2)?"↑":"↓";
      const atr4H=atr(pair4H);
      const atrPct=atr4H/currentPrice*100;
      const slRef = sig.dir==="LONG" ? currentPrice-atr4H : currentPrice+atr4H;

      // ── Estado EMAs del par ─────────────────────────────────────────────────
      const spread=(Math.max(e20,e50,e100)-Math.min(e20,e50,e100))/currentPrice;
      let emaState;
      if(spread<0.015){emaState="ENTRELAZADAS";}
      else if(e20>e50&&e50>e100){emaState="ORDENADAS ALCISTAS";}
      else if(e20<e50&&e50<e100){emaState="ORDENADAS BAJISTAS";}
      else{emaState="MIXTAS";}

      // ── Tipo de señal ───────────────────────────────────────────────────────
      const sigTypeLabel = sig.type==="FASE2"?"RSI EXTREMO FASE 2":sig.type==="FASE3"?"RSI EXTREMO FASE 3":"ALERTA ESTÁNDAR";

      // ── Condiciones bot separadas ───────────────────────────────────────────
      const condDir = sig.conditions||[];
      const condLong = sig.dir==="LONG" ? condDir : [];
      const condShort = sig.dir==="SHORT" ? condDir : [];

      // ── Veto duro: rango 4H ─────────────────────────────────────────────────
      if(spread<0.015){
        return{vetado:true,vetoMsg:"🚫 VETADO — Rango confirmado en 4H. Las tres EMAs están entrelazadas.",avisos:[],
          data:{currentPrice,ema20:e20,ema50:e50,ema100:e100,ema200:e200,rsi4H,rsiDir4H,atr4H,atrPct,slRef,emaState,
            btcPrice,btcEma200:btcE200,btcState,sigTypeLabel,condLong,condShort},sig};
      }

      // ── Avisos ──────────────────────────────────────────────────────────────
      const avisos = [];

      if(parseInt(openPos)>=2){
        avisos.push({type:"overtrading",msg:"⚠️ 2 posiciones abiertas — informa a Claude del estado de cada una antes de pedir análisis. Claude decide si hay trade."});
      }
      if(atrPct>3){
        avisos.push({type:"atr",msg:`⚠️ ATR posiblemente inflado — SL calculado supera el 3% (${atrPct.toFixed(1)}%). Informa a Claude. Claude decide si operar con SL amplio o esperar.`});
      }
      if(sig.entry){
        const origin=sig.entry;
        const emas=[e20,e50,e100,e200];
        let targetEMA=null;
        if(sig.dir==="LONG"){const ab=emas.filter(e=>e>origin).sort((a,b)=>a-b);targetEMA=ab[0]||null;}
        else{const bl=emas.filter(e=>e<origin).sort((a,b)=>b-a);targetEMA=bl[0]||null;}
        if(targetEMA){
          const totalDist=Math.abs(targetEMA-origin);
          const traveled=sig.dir==="LONG"?(currentPrice-origin):(origin-currentPrice);
          if(totalDist>0&&traveled>0){
            const pct=traveled/totalDist*100;
            if(pct>40) avisos.push({type:"consumed",msg:`⚠️ Señal posiblemente consumida — el precio se alejó un ${pct.toFixed(0)}% del punto de origen. Informa a Claude.`});
          }
        }
      }

      return{vetado:false,vetoMsg:null,avisos,
        data:{currentPrice,ema20:e20,ema50:e50,ema100:e100,ema200:e200,rsi4H,rsiDir4H,atr4H,atrPct,slRef,emaState,
          btcPrice,btcEma200:btcE200,btcState,sigTypeLabel,condLong,condShort},sig};
    };

    // ─── SCANNER ──────────────────────────────────────────────────────────────
    const PAIRS_16=["BTC","ETH","SOL","XRP","ADA","TAO","STX","SUI","NEAR","DOT","INJ","AAVE","AVAX","HBAR","POL","RUNE"];
    const scanPair = async (pair) => {
      try {
        const d1=await fetchC(pair,"1D",50);
        await sleep(300);
        const h4=await fetchC(pair,"4h",50);
        const c1=d1.map(c=>c.c), c4=h4.map(c=>c.c), p=c1.at(-1);
        const e200=ema(c1,200).at(-1), e50=ema(c1,50).at(-1), e20=ema(c1,20).at(-1);
        const r1D=rsi(c1).at(-1), r4H=rsi(c4).at(-1), a4H=atr(h4);
        const aboveEMA200=p>e200; let score=0;
        if(aboveEMA200) score+=20; if(r4H<35||r4H>65) score+=30;
        const distEMA=Math.min(Math.abs(p-e20),Math.abs(p-e50))/p*100;
        if(distEMA<1) score+=30; const ranging=Math.abs(e20-e50)/p*100<0.5; if(!ranging) score+=20;
        return{pair,price:p,ema200:e200,rsi1D:r1D.toFixed(1),rsi4H:r4H.toFixed(1),atr:a4H,dir:aboveEMA200?"LONG":"SHORT",score,ranging,distEMA:distEMA.toFixed(2)};
      } catch { return null; }
    };

    // ─── UI ───────────────────────────────────────────────────────────────────
    const uid=()=>Math.random().toString(36).slice(2,9);
    const f=(n,dec)=>{if(n==null||isNaN(n))return"—";const d=dec!=null?dec:n<0.01?6:n<1?4:n<100?4:2;return n.toFixed(d);};
    const C={bg:"#080B14",card:"#0F1827",border:"#1E293B",gold:"#F0A500",green:"#2ECC71",red:"#E74C3C",blue:"#3498DB",orange:"#E67E22",gray:"#6B7280",text:"#E8EAF0",purple:"#9B59B6"};
    const Card=({children,style={}})=><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12,...style}}>{children}</div>;
    const Title=({children})=><div style={{color:C.gold,fontSize:11,fontWeight:700,letterSpacing:2,marginBottom:12}}>{children}</div>;
    const Row=({k,v,vc})=><div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1A2235"}}><span style={{color:C.gray,fontSize:11}}>{k}</span><span style={{color:vc||C.text,fontWeight:600,fontSize:12}}>{v}</span></div>;
    const Pill=({c,children})=><span style={{background:c+"22",color:c,borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:700,marginLeft:4}}>{children}</span>;
    const Btn=({onClick,children,color=C.gold,disabled=false,style={}})=><button onClick={onClick} disabled={disabled} style={{background:disabled?"#333":color,border:"none",borderRadius:6,padding:"10px 14px",color:color===C.gold?"#080B14":"#fff",fontFamily:"'Courier New',monospace",fontSize:12,fontWeight:700,cursor:disabled?"not-allowed":"pointer",letterSpacing:1,...style}}>{children}</button>;
    // ─── RESULTADO DE SEÑAL ───────────────────────────────────────────────────
    const SignalResult=({result,sig,idx,capital,openPos,mode})=>{
      if(!result||!result.data) return null;
      const {vetado,vetoMsg,avisos,data}=result;
      const bdr=vetado?C.red:C.green;
      const resumen=buildResumen(sig,result,capital,openPos,mode);
      const isCopied=copied[idx];
      const doCopy=()=>{
        navigator.clipboard.writeText(resumen).then(()=>{
          setCopied(p=>({...p,[idx]:true}));
          setTimeout(()=>setCopied(p=>({...p,[idx]:false})),2000);
        });
      };
      // Color estado BTC
      const btcC=data.btcState==="TENDENCIA ALCISTA"?C.green:data.btcState==="TENDENCIA BAJISTA"?C.red:data.btcState==="RECUPERACIÓN"?C.orange:data.btcState==="DISTRIBUCIÓN"?"#9B59B6":C.gray;
      return(
        <div style={{background:C.card,border:`2px solid ${bdr}`,borderRadius:10,padding:14,marginBottom:12}}>
          {/* ── cabecera ── */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <span style={{fontWeight:700,color:C.gold,fontSize:15}}>{sig.pair}USDT</span>
              <Pill c={sig.dir==="LONG"?C.green:C.red}>{sig.dir}</Pill>
              <Pill c={C.blue}>{data.sigTypeLabel||sig.type}</Pill>
            </div>
            {vetado
              ?<span style={{color:C.red,fontWeight:700,fontSize:12}}>🚫 VETADO</span>
              :<span style={{color:C.green,fontWeight:700,fontSize:12}}>✅ PASA FILTRO</span>
            }
          </div>

          {/* ── veto ── */}
          {vetado&&<div style={{background:"#1E0A0A",border:`1px solid ${C.red}`,borderRadius:6,padding:"8px 10px",marginBottom:10,color:C.red,fontSize:12,fontWeight:700,lineHeight:1.5}}>{vetoMsg}</div>}

          {/* ── avisos ── */}
          {avisos&&avisos.length>0&&avisos.map((a,i)=>(
            <div key={i} style={{background:"#1A1000",border:`1px solid ${C.orange}`,borderRadius:6,padding:"7px 10px",marginBottom:6,color:C.orange,fontSize:12,lineHeight:1.4}}>⚠️ {a.msg}</div>
          ))}

          {/* ── datos del activo ── */}
          <div style={{background:"#0A0F1A",borderRadius:6,padding:"8px 10px",marginBottom:10}}>
            <Row k="Precio actual" v={f(data.currentPrice)}/>
            <Row k="RSI 4H" v={data.rsi4H!=null?`${data.rsi4H.toFixed(1)} ${data.rsiDir4H||""}`.trim():"—"}/>
            <Row k="ATR 4H" v={data.atr4H!=null?`${f(data.atr4H)} (${data.atrPct.toFixed(1)}%)`:"—"}/>
            <Row k="SL ref 1×ATR" v={f(data.slRef)} vc={C.orange}/>
            <Row k="EMA20/50/100/200" v={`${f(data.ema20)} / ${f(data.ema50)} / ${f(data.ema100)} / ${f(data.ema200)}`}/>
            <Row k="Estado EMAs" v={data.emaState||"—"} vc={data.emaState==="ORDENADAS ALCISTAS"?C.green:data.emaState==="ORDENADAS BAJISTAS"?C.red:C.orange}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #1A2235"}}>
              <span style={{color:C.gray,fontSize:11}}>BTC 4H</span>
              <span style={{color:btcC,fontWeight:700,fontSize:11}}>{data.btcState||"—"}</span>
            </div>
          </div>

          {/* ── bloque resumen ── */}
          {!vetado&&<>
            <div style={{color:C.gold,fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:6}}>RESUMEN PARA CLAUDE</div>
            <pre style={{background:"#060A12",border:`1px solid ${C.border}`,borderRadius:6,padding:"10px 12px",fontSize:10,color:"#A0AEC0",fontFamily:"'Courier New',monospace",whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0,marginBottom:8,lineHeight:1.6}}>{resumen}</pre>
            <Btn onClick={doCopy} color={isCopied?C.green:C.gold} style={{width:"100%"}}>
              {isCopied?"✅ COPIADO":"📋 COPIAR RESUMEN PARA CLAUDE"}
            </Btn>
          </>}
        </div>
      );
    };

    const FaseInfoCard=({sig})=>{
      const isFase1=sig.type==="FASE1";
      const color=isFase1?C.blue:C.orange;
      const icon=isFase1?"👀":"⚠️";
      return(
        <div style={{background:C.card,border:`2px solid ${color}`,borderRadius:10,padding:14,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span style={{fontWeight:700,color:C.gold,fontSize:14}}>{sig.pair}</span><Pill c={sig.dir==="LONG"?C.green:C.red}>{sig.dir}</Pill><Pill c={color}>{sig.type}</Pill></div>
            <span style={{fontSize:20}}>{icon}</span>
          </div>
          <div style={{marginTop:10,padding:8,background:"#0A0F1A",borderRadius:6,color:color,fontSize:12}}>{icon} {isFase1?"RSI VIGILANCIA — FASE 1":"RSI GIRANDO — FASE 2"} — solo observar</div>
        </div>
      );
    };

    // ─── APP ──────────────────────────────────────────────────────────────────
    function App() {
      const [tab,setTab]=useState("radar");
      const [raw,setRaw]=useState("");
      const [capital,setCapital]=useState("200");
      const [openPos,setOpenPos]=useState("0");
      const [mode,setMode]=useState("Normal");
      const [parsed,setParsed]=useState([]);
      const [results,setResults]=useState([]);
      const [loading,setLoading]=useState(false);
      const [loadingPairs,setLoadingPairs]=useState([]);
      const [btcStatus,setBtcStatus]=useState(null);
      const [positions,setPositions]=useState([]);
      const [diary,setDiary]=useState([]);
      const [scanner,setScanner]=useState([]);
      const [scanning,setScanning]=useState(false);
      const [priceTick,setPriceTick]=useState({});
      const [parseError,setParseError]=useState("");
      const [copied,setCopied]=useState({});
      const [editingPos,setEditingPos]=useState(null);
      const [showAddManual,setShowAddManual]=useState(false);
      const [editingDiary,setEditingDiary]=useState(null);
      const [confirmClear,setConfirmClear]=useState(false);

      useEffect(()=>{
        const p=localStorage.getItem("pos_v3"); if(p) setPositions(JSON.parse(p));
        const d=localStorage.getItem("diary_v3"); if(d) setDiary(JSON.parse(d));
        const cap=localStorage.getItem("capital_v3"); if(cap) setCapital(cap);
        const m=localStorage.getItem("mode_v3"); if(m) setMode(m);
        const op=localStorage.getItem("openPos_v3"); if(op) setOpenPos(op);
        loadBTC();
      },[]);
      useEffect(()=>{localStorage.setItem("capital_v3",capital);},[capital]);
      useEffect(()=>{localStorage.setItem("mode_v3",mode);},[mode]);
      useEffect(()=>{localStorage.setItem("openPos_v3",openPos);},[openPos]);

      useEffect(()=>{
        if(!positions.length) return;
        const iv=setInterval(async()=>{const t={};for(const p of positions){try{t[p.pair]=await fetchPrice(p.pair);}catch{}}setPriceTick(t);},30000);
        return()=>clearInterval(iv);
      },[positions]);

      const savePos=(p)=>{setPositions(p);localStorage.setItem("pos_v3",JSON.stringify(p));};
      const saveDiary=(d)=>{setDiary(d);localStorage.setItem("diary_v3",JSON.stringify(d));};

      const loadBTC=async()=>{
        try{
          const cs=await fetchC("BTC","4h",250);
          const cl=cs.map(c=>c.c);
          const e200=ema(cl,200).at(-1),e100=ema(cl,100).at(-1),e50=ema(cl,50).at(-1),e20=ema(cl,20).at(-1);
          const p=cl.at(-1),r=rsi(cl).at(-1);
          let state;
          const nearEMA200=Math.abs(p-e200)/p*100<2;
          if(nearEMA200){state="AMBIGUO";}
          else if(p>e200&&e20>e50&&e50>e100){state="TENDENCIA ALCISTA";}
          else if(p>e200&&e20<e50){state="RECUPERACIÓN";}
          else if(p<e200&&e20<e50){state="TENDENCIA BAJISTA";}
          else if(p<e200&&e20>e50){state="DISTRIBUCIÓN";}
          else{state="AMBIGUO";}
          setBtcStatus({price:p,ema200:e200,ema100:e100,ema50:e50,ema20:e20,above:p>e200,inCorr:p>e200&&e20<e50,rsi:r.toFixed(1),state});
        }catch(e){setBtcStatus({error:true,msg:e.message});}
      };

      const handleParse=()=>{
        setParseError("");setResults([]);
        const sigs=parseMessages(raw);
        if(!sigs.length){setParseError("No se reconoció ningún mensaje. Comprueba que copiaste el texto completo.");return;}
        setParsed(sigs);
      };

      const handleAnalyze=async()=>{
        if(!parsed.length) return;
        setLoading(true);setResults([]);
        const cap=parseFloat(capital)||200,op=parseInt(openPos)||0,res=[];
        for(const sig of parsed){
          if(sig.type==="FASE1"||sig.type==="FASE2"){res.push({sig,result:null});continue;}
          try{
            const r=await analyzeSignal(sig,cap,op,mode);
            res.push({sig,result:r});
          }catch(e){res.push({sig,result:{vetado:true,vetoMsg:`Error: ${e.message}`,avisos:[],data:{},sig}});}
        }
        setResults(res);setLoading(false);
      };

      const handleScan=async()=>{
        setScanning(true);setScanner([]);const res=[];
        for(const pair of PAIRS_16){
          setLoadingPairs(p=>[...p,pair]);
          const r=await scanPair(pair);
          if(r) res.push(r);
          setLoadingPairs(p=>p.filter(x=>x!==pair));
        }
        setScanner(res.sort((a,b)=>b.score-a.score));setScanning(false);
      };

      const addPos=(sig,entry,sl,tp1,tp2,tp3,riskUSDT)=>{
        savePos([...positions,{id:uid(),pair:sig.pair,dir:sig.dir,type:sig.type,entry,sl,tp1,tp2,tp3,riskUSDT,openedAt:new Date().toISOString(),mode}]);
        setTab("positions");
      };
      const updatePos=(id,fields)=>{savePos(positions.map(p=>p.id===id?{...p,...fields}:p));};
      const closePos=(pos,result,closePrice)=>{
        const cp=closePrice||priceTick[pos.pair]||pos.entry;
        const pnlPct=pos.dir==="LONG"?(cp-pos.entry)/pos.entry*100:(pos.entry-cp)/pos.entry*100;
        const pnlUSDT=+(pos.riskUSDT*(pnlPct/(Math.abs(pos.entry-pos.sl)/pos.entry*100))).toFixed(2);
        saveDiary([{...pos,result,closePrice:cp,pnlPct:+pnlPct.toFixed(2),pnlUSDT,closedAt:new Date().toISOString()},...diary]);
        savePos(positions.filter(p=>p.id!==pos.id));
      };
      const getPnL=(pos)=>{const cp=priceTick[pos.pair]||pos.entry,pct=pos.dir==="LONG"?(cp-pos.entry)/pos.entry*100:(pos.entry-cp)/pos.entry*100;return{pct,cp};};

      const stats=()=>{
        if(!diary.length) return null;
        const isWin=d=>d.result!=="SL"&&d.result!=="MANUAL_LOSS";
        const wins=diary.filter(isWin);
        const losses=diary.filter(d=>!isWin(d));
        const byT={SMT:{w:0,t:0,pnl:0},BMSB:{w:0,t:0,pnl:0},ALERTA:{w:0,t:0,pnl:0},FASE3:{w:0,t:0,pnl:0},OTRA:{w:0,t:0,pnl:0}},byP={};
        const totalPnl=diary.reduce((a,d)=>a+(d.pnlUSDT||0),0);
        diary.forEach(d=>{
          const t=d.type||"OTRA";
          const key=byT[t]!==undefined?t:"OTRA";
          byT[key].t++;if(isWin(d))byT[key].w++;byT[key].pnl+=(d.pnlUSDT||0);
          if(!byP[d.pair])byP[d.pair]={w:0,t:0,pnl:0};
          byP[d.pair].t++;if(isWin(d))byP[d.pair].w++;byP[d.pair].pnl+=(d.pnlUSDT||0);
        });
        return{total:diary.length,winRate:(wins.length/diary.length*100).toFixed(0),lossRate:(losses.length/diary.length*100).toFixed(0),totalPnl:+totalPnl.toFixed(2),byT,byP};
      };

      const tabs=[["radar","🎯 SEÑALES"],["scanner","📡 SCANNER"],["positions","📊 POSIC."],["stats","📈 STATS"]];

      return(
        <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Courier New',monospace",fontSize:13}}>
          {/* HEADER */}
          <div style={{background:"linear-gradient(90deg,#0D1321,#111827)",borderBottom:`1px solid ${C.border}`,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
            <div style={{color:C.gold,fontWeight:700,fontSize:14,letterSpacing:2}}>⚡ TRADING CMD v3</div>
            {btcStatus&&!btcStatus.error&&(()=>{
              const bsc=btcStatus.state==="TENDENCIA ALCISTA"?C.green:btcStatus.state==="RECUPERACIÓN"?C.orange:btcStatus.state==="DISTRIBUCIÓN"?C.purple:btcStatus.state==="TENDENCIA BAJISTA"?C.red:C.gray;
              const bsbg=btcStatus.state==="TENDENCIA ALCISTA"?"#0D2818":btcStatus.state==="RECUPERACIÓN"?"#1A1000":btcStatus.state==="DISTRIBUCIÓN"?"#150A20":btcStatus.state==="TENDENCIA BAJISTA"?"#1E0A0A":"#0A0F1A";
              const abbr=btcStatus.state==="TENDENCIA ALCISTA"?"BULL":btcStatus.state==="RECUPERACIÓN"?"CORR":btcStatus.state==="DISTRIBUCIÓN"?"DIST":btcStatus.state==="TENDENCIA BAJISTA"?"BEAR":"AMB";
              return<div style={{background:bsbg,border:`1px solid ${bsc}`,borderRadius:6,padding:"3px 10px",fontSize:12,color:bsc,cursor:"pointer",display:"flex",gap:6}} onClick={loadBTC}>
                <span>₿ {btcStatus.price.toFixed(0)}</span>
                <span style={{opacity:.7}}>{abbr}</span>
                <span>↻</span>
              </div>;
            })()}
            {btcStatus&&btcStatus.error&&<div style={{color:C.gold,fontSize:12,cursor:"pointer"}} onClick={loadBTC}>₿ {btcStatus?.msg||"Cargar BTC"}</div>}
          </div>

          {/* TABS */}
          <div style={{display:"flex",background:"#0D1321",borderBottom:`1px solid ${C.border}`}}>
            {tabs.map(([id,label])=><div key={id} style={{flex:1,padding:"11px 0",textAlign:"center",cursor:"pointer",fontSize:11,fontWeight:tab===id?700:400,color:tab===id?C.gold:C.gray,borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent"}} onClick={()=>setTab(id)}>{label}</div>)}
          </div>

          <div style={{padding:14,maxWidth:500,margin:"0 auto"}}>

            {/* ── SEÑALES ── */}
            {tab==="radar"&&<>
              {/* ── SECCIÓN 1: Inputs del operador (siempre visibles) ── */}
              <Card>
                <Title>⚙️ PARÁMETROS DEL OPERADOR</Title>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                  <div>
                    <div style={{color:C.gray,fontSize:11,marginBottom:4}}>CAPITAL DISPONIBLE (USDT)</div>
                    <input value={capital} onChange={e=>setCapital(e.target.value)}
                      style={{width:"100%",background:"#0A0F1A",border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontFamily:"'Courier New',monospace",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <div style={{color:C.gray,fontSize:11,marginBottom:4}}>POSICIONES ABIERTAS</div>
                    <select value={openPos} onChange={e=>setOpenPos(e.target.value)}
                      style={{width:"100%",background:"#0A0F1A",border:`1px solid ${openPos==="3"?C.red:C.border}`,borderRadius:6,padding:"8px 10px",color:openPos==="3"?C.red:C.text,fontFamily:"'Courier New',monospace",fontSize:13,outline:"none",appearance:"none",boxSizing:"border-box"}}>
                      <option>0</option><option>1</option><option>2</option><option value="3">3 (MAX)</option>
                    </select>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {["Normal","Enfriamiento"].map(m=>(
                    <div key={m} onClick={()=>setMode(m)} style={{padding:"9px 0",textAlign:"center",borderRadius:6,cursor:"pointer",
                      background:mode===m?(m==="Normal"?"#0D2818":"#1E0A0A"):"#0A0F1A",
                      border:`1px solid ${mode===m?(m==="Normal"?C.green:C.red):C.border}`,
                      color:mode===m?(m==="Normal"?C.green:C.red):C.gray,fontSize:12,fontWeight:700}}>
                      {m==="Normal"?"✅ NORMAL (riesgo 2%)":"🔴 ENFRIAMIENTO (0.5%)"}
                    </div>
                  ))}
                </div>
                {openPos==="3"&&<div style={{background:"#1E0A0A",border:`1px solid ${C.red}`,borderRadius:6,padding:"7px 10px",marginTop:10,color:C.red,fontSize:12,fontWeight:700}}>🚫 MÁXIMO DE POSICIONES — no abrir nuevas</div>}
              </Card>

              {/* ── SECCIÓN 2: BTC 4H (solo si cargado) ── */}
              {btcStatus&&!btcStatus.error&&(()=>{
                const sc=btcStatus.state==="TENDENCIA ALCISTA"?C.green:btcStatus.state==="RECUPERACIÓN"?C.orange:btcStatus.state==="DISTRIBUCIÓN"?"#9B59B6":btcStatus.state==="TENDENCIA BAJISTA"?C.red:C.gray;
                const sbg=btcStatus.state==="TENDENCIA ALCISTA"?"#0D2818":btcStatus.state==="RECUPERACIÓN"?"#1A1000":btcStatus.state==="DISTRIBUCIÓN"?"#150A20":btcStatus.state==="TENDENCIA BAJISTA"?"#1E0A0A":"#0A0F1A";
                const smsg=btcStatus.state==="TENDENCIA ALCISTA"?"✅ LONGs favorables":btcStatus.state==="RECUPERACIÓN"?"⚠️ Contexto mixto":btcStatus.state==="DISTRIBUCIÓN"?"⚠️ Posible techo":btcStatus.state==="TENDENCIA BAJISTA"?"🚫 SHORTs favorables":"⚡ Sin sesgo claro";
                return<Card style={{borderColor:sc}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <Title style={{margin:0}}>₿ BITCOIN (4H)</Title>
                    <div style={{background:sbg,borderRadius:5,padding:"4px 10px",color:sc,fontSize:11,fontWeight:700}}>{btcStatus.state} — {smsg}</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
                    {[["Precio",btcStatus.price.toFixed(0)],["EMA200",btcStatus.ema200.toFixed(0)],["EMA50",btcStatus.ema50.toFixed(0)],["EMA20",btcStatus.ema20.toFixed(0)],["RSI 4H",btcStatus.rsi],[" "," "]].map(([k,v])=>(
                      <div key={k} style={{background:"#060A12",borderRadius:5,padding:"6px 8px"}}>
                        <div style={{color:C.gray,fontSize:10}}>{k}</div>
                        <div style={{color:C.text,fontWeight:700,fontSize:12}}>{v}</div>
                      </div>
                    ))}
                  </div>
                </Card>;
              })()}

              {/* ── SECCIÓN 3: Pegar mensajes ── */}
              <Card>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <Title style={{margin:0}}>📋 MENSAJES DEL BOT</Title>
                  {(raw||parsed.length>0||results.length>0)&&(
                    <button onClick={()=>{setRaw("");setParsed([]);setResults([]);setParseError("");setCopied({});}}
                      style={{background:"#1A0A0A",border:`1px solid ${C.red}`,borderRadius:5,padding:"4px 12px",color:C.red,fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                      🗑 LIMPIAR TODO
                    </button>
                  )}
                </div>
                <textarea value={raw} onChange={e=>{setRaw(e.target.value);setParsed([]);setResults([]);setParseError("");setCopied({});}}
                  placeholder={"Pega uno o varios mensajes de Telegram:
SMT Pro, BMSB, Alertas, RSI Extremo (Fase 1/2/3)

Puedes pegar múltiples mensajes seguidos."}
                  style={{width:"100%",minHeight:150,background:"#060A12",border:`1px solid ${parseError?C.red:C.border}`,borderRadius:8,padding:12,color:C.text,fontFamily:"'Courier New',monospace",fontSize:12,resize:"vertical",outline:"none",boxSizing:"border-box",lineHeight:1.6}}/>
                {parseError&&<div style={{color:C.red,fontSize:11,marginTop:6}}>⚠️ {parseError}</div>}
                <Btn onClick={handleParse} style={{width:"100%",marginTop:10}}>🔍 DETECTAR SEÑALES</Btn>
              </Card>

              {/* ── SECCIÓN 4: Señales detectadas + análisis ── */}
              {parsed.length>0&&<>
                <Card style={{borderColor:C.gold}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <Title style={{margin:0}}>✅ {parsed.length} SEÑAL{parsed.length>1?"ES":""} DETECTADA{parsed.length>1?"S":""}</Title>
                  </div>
                  {parsed.map((s,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                      <div>
                        <span style={{color:C.gold,fontWeight:700,fontSize:13}}>{s.pair}</span>
                        <Pill c={s.dir==="LONG"?C.green:C.red}>{s.dir}</Pill>
                        <Pill c={s.type==="FASE1"?C.blue:s.type==="FASE2"?C.orange:s.type==="FASE3"?"#9B59B6":C.blue}>{s.type}</Pill>
                        {s.priority&&<Pill c={s.priority==="PRIORITARIA"?C.red:C.orange}>{s.priority}</Pill>}
                      </div>
                      <span style={{color:C.gray,fontSize:10}}>{s.timeStr||"—"}</span>
                    </div>
                  ))}
                  <Btn onClick={handleAnalyze} disabled={loading} color={loading?C.gray:C.gold} style={{width:"100%",marginTop:12}}>
                    {loading?"⏳ ANALIZANDO...":"⚡ ANALIZAR SEÑALES"}
                  </Btn>
                </Card>

                {results.map(({sig,result},i)=>(
                  (sig.type==="FASE1"||sig.type==="FASE2")
                    ?<FaseInfoCard key={i} sig={sig}/>
                    :<SignalResult key={i} sig={sig} result={result} idx={i} capital={capital} openPos={openPos} mode={mode}/>
                ))}
              </>}
            </>}

            {/* ── SCANNER ── */}
            {tab==="scanner"&&<>
              <Card>
                <Title>📡 ESCÁNER — 16 PARES</Title>
                <div style={{color:C.gray,fontSize:11,marginBottom:12}}>Analiza los 16 pares en tiempo real directamente desde Crypto.com.</div>
                {loadingPairs.length>0&&<div style={{color:C.orange,fontSize:11,marginBottom:8}}>Analizando: {loadingPairs.join(", ")}...</div>}
                <Btn onClick={handleScan} disabled={scanning} color={scanning?C.gray:C.gold} style={{width:"100%"}}>{scanning?"⏳ ESCANEANDO...":"🔍 ESCANEAR AHORA"}</Btn>
              </Card>
              {scanner.length>0&&(()=>{
                const cols="2fr 1.1fr 1.1fr 1.1fr 1.3fr 1fr";
                const hdr=["PAR","DIR","RSI1D","RSI4H","DIST","SCORE"];
                return(
                  <Card style={{padding:0,overflow:"hidden"}}>
                    <div style={{display:"grid",gridTemplateColumns:cols,background:"#0A0F1A",borderBottom:"1px solid #1E293B",padding:"7px 10px"}}>
                      {hdr.map(h=><span key={h} style={{color:C.gray,fontSize:10,fontWeight:700,letterSpacing:1}}>{h}</span>)}
                    </div>
                    {scanner.map((s,i)=>(
                      <div key={s.pair} style={{display:"grid",gridTemplateColumns:cols,padding:"8px 10px",borderBottom:i<scanner.length-1?"1px solid #1E293B":"none",background:i%2===0?"transparent":"#0A0C12",alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontWeight:700,color:C.gold,fontSize:13}}>{s.pair}</span>
                          {s.ranging&&<span style={{background:"#E67E2222",color:C.orange,borderRadius:3,padding:"1px 4px",fontSize:9,fontWeight:700}}>RNG</span>}
                        </div>
                        <span style={{color:s.dir==="LONG"?C.green:C.red,fontWeight:700,fontSize:12}}>{s.dir}</span>
                        <span style={{color:parseFloat(s.rsi1D)<35?C.green:parseFloat(s.rsi1D)>65?C.red:C.text,fontSize:12,fontWeight:600}}>{s.rsi1D}</span>
                        <span style={{color:parseFloat(s.rsi4H)<35?C.green:parseFloat(s.rsi4H)>65?C.red:C.text,fontSize:12,fontWeight:600}}>{s.rsi4H}</span>
                        <span style={{color:parseFloat(s.distEMA)<1?C.gold:parseFloat(s.distEMA)<3?C.orange:C.gray,fontSize:12,fontWeight:600}}>{s.distEMA}%</span>
                        <span style={{color:s.score>=70?C.gold:s.score>=50?C.orange:C.gray,fontWeight:700,fontSize:13}}>{s.score}</span>
                      </div>
                    ))}
                  </Card>
                );
              })()}
            </>}

            {/* ── POSICIONES ── */}
            {tab==="positions"&&<>
              <Card>
                <Title>📊 EXPOSICIÓN TOTAL</Title>
                {(()=>{
                  const tr=positions.reduce((a,p)=>a+(p.riskUSDT||0),0),cap=parseFloat(capital)||200,pct=(tr/cap*100).toFixed(1);
                  return<>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                      <div><div style={{color:C.gray,fontSize:10}}>EN RIESGO</div><div style={{fontSize:26,fontWeight:700,color:+pct>3?C.red:+pct>2?C.orange:C.green}}>{pct}%</div></div>
                      <div style={{textAlign:"right"}}><div style={{color:C.gray,fontSize:10}}>POSICIONES</div><div style={{fontSize:26,fontWeight:700,color:C.gold}}>{positions.length}/3</div></div>
                    </div>
                    <div style={{background:"#0A0F1A",borderRadius:4,height:8,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(100,+pct/4*100)}%`,background:+pct>3?C.red:+pct>2?C.orange:C.green,borderRadius:4,transition:"width .3s"}}/></div>
                    {!positions.length&&<div style={{color:C.gray,textAlign:"center",marginTop:14,fontSize:12}}>Sin posiciones abiertas</div>}
                  </>;
                })()}
              </Card>
              {positions.map(pos=>{
                const{pct,cp}=getPnL(pos);
                const isEditing=editingPos===pos.id;
                const fld=(k,label,color)=>(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #1A2235"}}>
                    <span style={{color:C.gray,fontSize:11}}>{label}</span>
                    {isEditing&&["entry","sl","tp1","tp2","tp3"].includes(k)
                      ?<input defaultValue={pos[k]} onBlur={e=>updatePos(pos.id,{[k]:+e.target.value})}
                          style={{width:90,background:"#0A0F1A",border:"1px solid #F0A500",borderRadius:4,padding:"2px 6px",color:"#F0A500",fontFamily:"inherit",fontSize:12,textAlign:"right",outline:"none"}}/>
                      :<span style={{color:color||C.text,fontWeight:600,fontSize:12}}>{f(pos[k])}</span>
                    }
                  </div>
                );
                return(
                  <div key={pos.id} style={{background:C.card,border:`1px solid ${pct>=0?"#1A3A2A":"#2A1A1A"}`,borderRadius:10,padding:14,marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div>
                        <span style={{fontWeight:700,color:C.gold,fontSize:14}}>{pos.pair}</span>
                        <Pill c={pos.dir==="LONG"?C.green:C.red}>{pos.dir}</Pill>
                        <Pill c={C.blue}>{pos.type}</Pill>
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <div style={{background:pct>=0?"#0D2818":"#1E0A0A",color:pct>=0?C.green:C.red,padding:"3px 10px",borderRadius:4,fontSize:13,fontWeight:700}}>{pct>=0?"+":""}{pct.toFixed(2)}%</div>
                        <button onClick={()=>setEditingPos(isEditing?null:pos.id)} style={{background:isEditing?"#F0A50022":"#0A0F1A",border:`1px solid ${isEditing?C.gold:C.border}`,borderRadius:4,padding:"3px 8px",color:isEditing?C.gold:C.gray,fontFamily:"inherit",fontSize:10,fontWeight:700,cursor:"pointer"}}>{isEditing?"LISTO":"EDITAR"}</button>
                      </div>
                    </div>
                    {fld("entry","Entrada",C.gold)}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #1A2235"}}>
                      <span style={{color:C.gray,fontSize:11}}>Precio act.</span>
                      <span style={{color:pct>=0?C.green:C.red,fontWeight:600,fontSize:12}}>{f(cp)}</span>
                    </div>
                    {fld("sl","Stop Loss",C.red)}
                    {fld("tp1","TP1",C.green)}
                    {fld("tp2","TP2",C.green)}
                    {fld("tp3","TP3",C.green)}
                    <Row k="Leverage" v={`${pos.leverage}x`} vc={pos.leverage>=8?C.red:C.text}/>
                    <Row k="Riesgo" v={`${(pos.riskUSDT||0).toFixed(2)} USDT`}/>
                    <Row k="Score" v={`${pos.score}/10`}/>
                    <div style={{marginTop:10}}>
                      <div style={{color:C.gray,fontSize:10,marginBottom:6}}>ACTUALIZAR (no cierra)</div>
                      <div style={{display:"flex",gap:5,marginBottom:8}}>
                        {["TP1","TP2","BE"].map(r=>(
                          <button key={r} onClick={()=>updatePos(pos.id,{note:r,updatedAt:new Date().toISOString()})}
                            style={{flex:1,padding:"7px 2px",background:r==="BE"?"#0A0A1E":"#0D1A10",border:`1px solid ${r==="BE"?C.blue:C.green}`,borderRadius:5,color:r==="BE"?C.blue:C.green,fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>{r}</button>
                        ))}
                      </div>
                      <div style={{color:C.gray,fontSize:10,marginBottom:6}}>CERRAR POSICION</div>
                      <div style={{display:"flex",gap:5}}>
                        {["TP3","SL"].map(r=>(
                          <button key={r} onClick={()=>closePos(pos,r)}
                            style={{flex:1,padding:"7px 2px",background:r==="SL"?"#1E0A0A":"#0D2818",border:`1px solid ${r==="SL"?C.red:C.green}`,borderRadius:5,color:r==="SL"?C.red:C.green,fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>{r}</button>
                        ))}
                        <button onClick={()=>{const p=prompt("Precio de cierre:");if(p&&!isNaN(+p))closePos(pos,"MANUAL",+p);}}
                          style={{flex:1,padding:"7px 2px",background:"#0A0A1E",border:`1px solid ${C.orange}`,borderRadius:5,color:C.orange,fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>MANUAL</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </>}

            {/* ── STATS ── */}
            {tab==="stats"&&(()=>{
              const s=stats();

              // Formulario añadir manual
              const ManualForm=()=>{
                const [mp,setMp]=useState("");const [mdir,setMdir]=useState("LONG");const [mtype,setMtype]=useState("ALERTA");
                const [mresult,setMresult]=useState("TP3");const [mpnl,setMpnl]=useState("");
                const add=()=>{
                  if(!mp) return;
                  const isW=mresult!=="SL"&&mresult!=="MANUAL_LOSS";
                  saveDiary([{id:uid(),pair:mp.toUpperCase(),dir:mdir,type:mtype,result:mresult,pnlUSDT:+mpnl||0,pnlPct:0,riskUSDT:0,entry:0,sl:0,tp1:0,tp2:0,tp3:0,score:0,closedAt:new Date().toISOString(),manual:true},...diary]);
                  setShowAddManual(false);
                };
                return(
                  <Card style={{borderColor:C.gold}}>
                    <Title>+ AÑADIR OPERACION MANUAL</Title>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                      <div>
                        <div style={{color:C.gray,fontSize:10,marginBottom:4}}>PAR</div>
                        <input value={mp} onChange={e=>setMp(e.target.value)} placeholder="BTC" style={{width:"100%",background:"#0A0F1A",border:"1px solid #1E293B",borderRadius:5,padding:"6px 8px",color:C.text,fontFamily:"inherit",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                      </div>
                      <div>
                        <div style={{color:C.gray,fontSize:10,marginBottom:4}}>P&L (USDT)</div>
                        <input value={mpnl} onChange={e=>setMpnl(e.target.value)} placeholder="0.00" style={{width:"100%",background:"#0A0F1A",border:"1px solid #1E293B",borderRadius:5,padding:"6px 8px",color:C.text,fontFamily:"inherit",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,marginBottom:8}}>
                      {["LONG","SHORT"].map(d=><div key={d} onClick={()=>setMdir(d)} style={{flex:1,padding:"6px 0",textAlign:"center",borderRadius:5,cursor:"pointer",background:mdir===d?(d==="LONG"?"#0D2818":"#1E0A0A"):"#0A0F1A",border:`1px solid ${mdir===d?(d==="LONG"?C.green:C.red):C.border}`,color:mdir===d?(d==="LONG"?C.green:C.red):C.gray,fontSize:12,fontWeight:700}}>{d}</div>)}
                    </div>
                    <div style={{display:"flex",gap:6,marginBottom:8}}>
                      {["SMT","BMSB","ALERTA","OTRA"].map(t=><div key={t} onClick={()=>setMtype(t)} style={{flex:1,padding:"6px 0",textAlign:"center",borderRadius:5,cursor:"pointer",background:mtype===t?"#0D1A2A":"#0A0F1A",border:`1px solid ${mtype===t?C.blue:C.border}`,color:mtype===t?C.blue:C.gray,fontSize:11,fontWeight:700}}>{t}</div>)}
                    </div>
                    <div style={{display:"flex",gap:6,marginBottom:10}}>
                      {["TP1","TP2","TP3","SL","MANUAL_LOSS"].map(r=><div key={r} onClick={()=>setMresult(r)} style={{flex:1,padding:"5px 0",textAlign:"center",borderRadius:5,cursor:"pointer",background:mresult===r?(r==="SL"||r==="MANUAL_LOSS"?"#1E0A0A":"#0D2818"):"#0A0F1A",border:`1px solid ${mresult===r?(r==="SL"||r==="MANUAL_LOSS"?C.red:C.green):C.border}`,color:mresult===r?(r==="SL"||r==="MANUAL_LOSS"?C.red:C.green):C.gray,fontSize:10,fontWeight:700}}>{r}</div>)}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={add} style={{flex:1,background:C.gold,border:"none",borderRadius:6,padding:"9px",color:"#080B14",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer"}}>GUARDAR</button>
                      <button onClick={()=>setShowAddManual(false)} style={{flex:1,background:"#0A0F1A",border:"1px solid #1E293B",borderRadius:6,padding:"9px",color:C.gray,fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer"}}>CANCELAR</button>
                    </div>
                  </Card>
                );
              };

              // Formulario editar entrada del diario
              const EditDiary=({d})=>{
                const [ep,setEp]=useState(d.pnlUSDT||0);
                const [er,setEr]=useState(d.result);
                const save=()=>{saveDiary(diary.map(x=>x.id===d.id?{...x,pnlUSDT:+ep,result:er}:x));setEditingDiary(null);};
                return(
                  <div style={{background:"#0A0F1A",borderRadius:6,padding:10,marginTop:6}}>
                    <div style={{display:"flex",gap:6,marginBottom:8}}>
                      {["TP1","TP2","TP3","SL","MANUAL","MANUAL_LOSS"].map(r=>(
                        <div key={r} onClick={()=>setEr(r)} style={{flex:1,padding:"4px 0",textAlign:"center",borderRadius:4,cursor:"pointer",background:er===r?(r==="SL"||r==="MANUAL_LOSS"?"#1E0A0A":"#0D2818"):"#080B14",border:`1px solid ${er===r?(r==="SL"||r==="MANUAL_LOSS"?C.red:C.green):C.border}`,color:er===r?(r==="SL"||r==="MANUAL_LOSS"?C.red:C.green):C.gray,fontSize:9,fontWeight:700}}>{r}</div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <input value={ep} onChange={e=>setEp(e.target.value)} style={{flex:1,background:"#080B14",border:"1px solid #F0A500",borderRadius:4,padding:"6px 8px",color:"#F0A500",fontFamily:"inherit",fontSize:12,outline:"none"}} placeholder="P&L USDT"/>
                      <button onClick={save} style={{background:C.gold,border:"none",borderRadius:4,padding:"6px 14px",color:"#080B14",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>OK</button>
                      <button onClick={()=>setEditingDiary(null)} style={{background:"#0A0F1A",border:"1px solid #1E293B",borderRadius:4,padding:"6px 10px",color:C.gray,fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>X</button>
                    </div>
                  </div>
                );
              };

              return(
                <>
                  {/* Botón añadir manual */}
                  <button onClick={()=>setShowAddManual(!showAddManual)} style={{width:"100%",background:"#0A0F1A",border:"1px solid #F0A500",borderRadius:6,padding:"9px",color:"#F0A500",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:10}}>+ AÑADIR OPERACION MANUAL</button>
                  {showAddManual&&<ManualForm/>}

                  {!s&&<Card style={{textAlign:"center",padding:40}}><div style={{fontSize:32,marginBottom:10}}>📈</div><div style={{color:C.gray}}>Sin operaciones en el diario</div></Card>}

                  {s&&(()=>{
                    return(
                      <>
                        {/* Resumen */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
                          <Card><div style={{color:C.green,fontSize:10,marginBottom:4}}>WIN RATE</div><div style={{fontSize:22,fontWeight:700,color:+s.winRate>=60?C.green:+s.winRate>=40?C.orange:C.red}}>{s.winRate}%</div></Card>
                          <Card><div style={{color:C.red,fontSize:10,marginBottom:4}}>LOSS RATE</div><div style={{fontSize:22,fontWeight:700,color:+s.lossRate>=60?C.red:+s.lossRate>=40?C.orange:C.gray}}>{s.lossRate}%</div></Card>
                          <Card><div style={{color:C.gold,fontSize:10,marginBottom:4}}>TOTAL OPS</div><div style={{fontSize:22,fontWeight:700,color:C.gold}}>{s.total}</div></Card>
                        </div>
                        <Card style={{borderColor:s.totalPnl>=0?C.green:C.red}}>
                          <div style={{color:C.gray,fontSize:10,marginBottom:4}}>P&L TOTAL</div>
                          <div style={{fontSize:26,fontWeight:700,color:s.totalPnl>=0?C.green:C.red}}>{s.totalPnl>=0?"+":""}{s.totalPnl} USDT</div>
                        </Card>

                        {/* Por estrategia */}
                        <Card>
                          <Title>POR ESTRATEGIA</Title>
                          {Object.entries(s.byT).filter(([,v])=>v.t>0).map(([t,data])=>{
                            const wr=data.t?data.w/data.t*100:0;
                            return(
                              <div key={t} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1E293B"}}>
                                <div>
                                  <div style={{fontWeight:700}}>{t}</div>
                                  <div style={{color:C.gray,fontSize:11}}>{data.t} ops · P&L: <span style={{color:data.pnl>=0?C.green:C.red,fontWeight:700}}>{data.pnl>=0?"+":""}{data.pnl.toFixed(2)}</span></div>
                                </div>
                                <div style={{background:wr>=60?"#0D2818":"#1E0A0A",color:wr>=60?C.green:C.red,padding:"3px 10px",borderRadius:4,fontWeight:700}}>{wr.toFixed(0)}%</div>
                              </div>
                            );
                          })}
                        </Card>

                        {/* Por par */}
                        <Card>
                          <Title>POR PAR</Title>
                          {Object.entries(s.byP).sort((a,b)=>b[1].t-a[1].t).map(([pair,data])=>{
                            const wr=data.t?data.w/data.t*100:0;
                            return(
                              <div key={pair} style={{marginBottom:10}}>
                                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                                  <span style={{fontWeight:700}}>{pair}</span>
                                  <div style={{textAlign:"right"}}>
                                    <span style={{color:wr>=60?C.green:wr>=40?C.orange:C.red,fontWeight:700}}>{wr.toFixed(0)}% ({data.w}/{data.t})</span>
                                    <span style={{color:data.pnl>=0?C.green:C.red,fontSize:11,marginLeft:8}}>{data.pnl>=0?"+":""}{data.pnl.toFixed(2)}</span>
                                  </div>
                                </div>
                                <div style={{background:"#0A0F1A",borderRadius:3,height:5}}><div style={{height:"100%",width:`${wr}%`,background:wr>=60?C.green:wr>=40?C.orange:C.red,borderRadius:3}}/></div>
                              </div>
                            );
                          })}
                        </Card>

                        {/* Historial */}
                        <Card>
                          <Title>HISTORIAL</Title>
                          {diary.map((d,i)=>(
                            <div key={d.id||i} style={{padding:"8px 0",borderBottom:"1px solid #1E293B"}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                <div>
                                  <span style={{fontWeight:700,color:C.gold}}>{d.pair}</span>
                                  <span style={{color:d.dir==="LONG"?C.green:C.red,fontSize:11,marginLeft:6}}>{d.dir}</span>
                                  <span style={{color:C.gray,fontSize:11,marginLeft:6}}>{d.type}</span>
                                  {d.manual&&<span style={{color:C.orange,fontSize:10,marginLeft:6}}>MANUAL</span>}
                                </div>
                                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                  <span style={{color:d.pnlUSDT>=0?C.green:C.red,fontWeight:700,fontSize:12}}>{d.pnlUSDT>=0?"+":""}{(d.pnlUSDT||0).toFixed(2)}</span>
                                  <span style={{background:d.result==="SL"||d.result==="MANUAL_LOSS"?"#1E0A0A":"#0D2818",color:d.result==="SL"||d.result==="MANUAL_LOSS"?C.red:C.green,borderRadius:3,padding:"2px 6px",fontSize:10,fontWeight:700}}>{d.result}</span>
                                  <button onClick={()=>setEditingDiary(editingDiary===d.id?null:d.id)} style={{background:"transparent",border:"1px solid #1E293B",borderRadius:3,padding:"2px 6px",color:C.gray,fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>✏</button>
                                  <button onClick={()=>{if(window.confirm("¿Eliminar esta operacion?"))saveDiary(diary.filter((_,j)=>j!==i));}} style={{background:"transparent",border:"1px solid #1E293B",borderRadius:3,padding:"2px 6px",color:C.red,fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>✕</button>
                                </div>
                              </div>
                              {editingDiary===d.id&&<EditDiary d={d}/>}
                            </div>
                          ))}
                        </Card>

                        {/* Borrar todo */}
                        {!confirmClear
                          ?<button onClick={()=>setConfirmClear(true)} style={{background:"transparent",border:"1px solid #2D3748",borderRadius:6,padding:"8px",color:"#4A5568",fontFamily:"inherit",fontSize:11,cursor:"pointer",width:"100%",marginTop:4}}>Borrar historial completo</button>
                          :<div style={{background:"#1E0A0A",border:"1px solid #E74C3C",borderRadius:6,padding:12,marginTop:4}}>
                            <div style={{color:"#E74C3C",fontSize:12,fontWeight:700,marginBottom:10,textAlign:"center"}}>Esta accion es irreversible. ¿Confirmas?</div>
                            <div style={{display:"flex",gap:8}}>
                              <button onClick={()=>{saveDiary([]);setConfirmClear(false);}} style={{flex:1,background:"#E74C3C",border:"none",borderRadius:5,padding:"9px",color:"#fff",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer"}}>SI, BORRAR TODO</button>
                              <button onClick={()=>setConfirmClear(false)} style={{flex:1,background:"#0A0F1A",border:"1px solid #1E293B",borderRadius:5,padding:"9px",color:"#6B7280",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer"}}>CANCELAR</button>
                            </div>
                          </div>
                        }
                      </>
                    );
                  })()}
                </>
              );
            })()}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW registrado'))
          .catch(e => console.log('SW error:', e));
      });
    }
  </script>
</body>
</html>
