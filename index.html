<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Trading Bot v3</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background: #080B14; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        * { box-sizing: border-box; }
        select option { background: #0D1321; color: #E8EAF0; }
        textarea::placeholder { color: #2D3748; }
        input:focus, select:focus, textarea:focus { border-color: #F0A500!important; outline: none; }
        button:hover:not(:disabled) { opacity: .85; }
        button:disabled { opacity: .5; cursor: not-allowed; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #080B14; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FUNCIONES MATEMÁTICAS ---
        const ema=(d,p)=>{const k=2/(p+1);return d.reduce((a,v,i)=>{a.push(i===0?v:v*k+a[i-1]*(1-k));return a;},[]);};
        const rsi=(c,p=14)=>{if(c.length<p+1)return c.map(()=>50);const r=new Array(p).fill(50);let ag=0,al=0;for(let i=1;i<=p;i++){const d=c[i]-c[i-1];ag+=d>0?d:0;al+=d<0?-d:0;}ag/=p;al/=p;r.push(al===0?100:100-100/(1+ag/al));for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?-d:0))/p;r.push(al===0?100:100-100/(1+ag/al));}return r;};
        const atr=(cs,p=14)=>{if(cs.length<2)return 0;const trs=cs.slice(1).map((c,i)=>Math.max(c.h-c.l,Math.abs(c.h-cs[i].c),Math.abs(c.l-cs[i].c)));let a=trs.slice(0,p).reduce((s,v)=>s+v,0)/Math.min(p,trs.length);trs.slice(p).forEach(t=>{a=(a*(p-1)+t)/p;});return a;};
        
        // --- API REQUESTS CORREGIDAS ---
        const fetchC=async(pair,tf,count=250)=>{
          const exactTf = tf === "1H" ? "1h" : tf === "4H" ? "4h" : tf === "1D" ? "1D" : tf;
          const cleanPair = pair.trim();
          const r=await fetch(`https://api.crypto.com/exchange/v1/public/get-candlestick?instrument_name=${cleanPair}_USDT&timeframe=${exactTf}&count=${count}`);
          const d=await r.json();
          if(d.code!==0)throw new Error(d.message||"API error");
          return d.result.data.map(c=>({t:+c.t,o:+c.o,h:+c.h,l:+c.l,c:+c.c})).sort((a,b)=>a.t-b.t);
        };
        const fetchPrice=async(pair)=>{const r=await fetch(`https://api.crypto.com/exchange/v1/public/get-ticker?instrument_name=${pair}_USDT`);const d=await r.json();return+d.result.data.a;};

        // --- LECTURA DE MENSAJES CORREGIDA ---
        const parseMessages=(raw)=>{
          const signals=[];
          const blocks=raw.split(/(?=SMT Alertas|SMT Pro|🔴|🟢|\n\s*\n)/i).filter(b=>b.trim().length>10);
          
          for(const block of blocks){
            const b=block.trim();
            
            // 1. Detectar BMSB
            if(b.includes("BMSB")||b.includes("Bullmarket")){
              const pair=(b.match(/([A-Z]{2,10})USDT/)||[])[1];
              const dir=b.includes("LONG")||b.includes("🟢")?"LONG":"SHORT";
              const banda=parseFloat((b.match(/Banda\s+(?:sup|inf)\s*[.:]\s*([\d.]+)/i)||[])[1]);
              const timeStr=(b.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2})/)||[])[1];
              if(pair) signals.push({type:"BMSB",pair,dir,banda,timeStr,raw:b});
            }
            // 2. Detectar SMT Pro
            else if(b.includes("SMT Pro")||b.includes("BOS/CHoCH")||b.includes("CHoCH")){
              const pair=(b.match(/([A-Z]{2,10})USDT/)||[])[1];
              const dir=b.includes("LONG")||b.includes("🟢")?"LONG":"SHORT";
              const entry=parseFloat((b.match(/Entrada\s*:\s*([\d.]+)/)||[])[1]);
              const tp1=parseFloat((b.match(/TP1\s*:\s*([\d.]+)/)||[])[1]);
              const tp2=parseFloat((b.match(/TP2\s*:\s*([\d.]+)/)||[])[1]);
              const tp3=parseFloat((b.match(/TP3\s*:\s*([\d.]+)/)||[])[1]);
              const sl=parseFloat((b.match(/SL\s*:\s*([\d.]+)/)||[])[1]);
              const signal=(b.match(/Señal\s*:\s*([A-Za-z]+)/)||[])[1]||"BOS";
              const timeStr=(b.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2})/)||[])[1];
              if(pair&&!isNaN(entry)) signals.push({type:"SMT",pair,dir,entry,tp1,tp2,tp3,sl,signal,timeStr,raw:b});
            }
            // 3. Detectar Alertas normales
            else if(b.includes("MEDIA")||b.includes("PRIORITARIA")||b.includes("Cumplidas")||b.includes("Pendientes")){
              const pair=(b.match(/([A-Z]{2,10})USDT/)||[])[1];
              const priority=b.includes("PRIORITARIA")?"PRIORITARIA":"MEDIA";
              const dir=b.includes("SHORT")||(b.includes("bajo EMA200")&&!b.includes("BTC: Alcista"))?"SHORT":"LONG";
              const cumplidas=parseInt((b.match(/Cumplidas\s*\((\d+)\/4\)/)||[])[1])||0;
              const conditions=[];let inC=false;
              b.split("\n").forEach(l=>{if(l.includes("Cumplidas")||l.includes("Pendientes"))inC=true;if(l.includes("BTC:"))inC=false;if(inC&&l.includes("•"))conditions.push(l.trim());});
              const btcBias=b.includes("BTC: Bajista")||b.includes("bajo EMA200")?"BAJISTA":"ALCISTA";
              const timeStr=(b.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2})/)||[])[1];
              if(pair) signals.push({type:"ALERTA",pair,dir,priority,cumplidas,conditions,btcBias,timeStr,raw:b});
            }
          }
          return signals;
        };

        const analyzeSenal=async(sig,capital,openPos,mode)=>{
          const [btcD,pairD,pair4H]=await Promise.all([fetchC("BTC","1D",250),fetchC(sig.pair==="BTC"?"ETH":sig.pair,"1D",100),fetchC(sig.pair==="BTC"?"ETH":sig.pair,"4H",100)]);
          const pairMain=sig.pair==="BTC"?btcD:pairD;
          const btcC=btcD.map(c=>c.c);
          const btcEMA200=ema(btcC,200).at(-1),btcEMA20=ema(btcC,20).at(-1),btcEMA50=ema(btcC,50).at(-1),btcPrice=btcC.at(-1);
          const btcAbove=btcPrice>btcEMA200,btcInCorr=btcAbove&&btcEMA20<btcEMA50;
          const p4C=pair4H.map(c=>c.c);
          const p4RSI=rsi(p4C),rsiNow=p4RSI.at(-1),rsiPrev=p4RSI.at(-6),rsiDir=rsiNow>rsiPrev?"↑":"↓";
          const atr4H=atr(pair4H),currentPrice=p4C.at(-1);
          const ema200_4H=ema(p4C,200).at(-1),ema50_4H=ema(p4C,50).at(-1),ema20_4H=ema(p4C,20).at(-1);
          const isRanging=Math.abs(ema20_4H-ema50_4H)/currentPrice*100<0.5;
          let ageHours=0;
          if(sig.timeStr){const[dp,tp]=sig.timeStr.split(" ");const[d,m,y]=dp.split("/");ageHours=(Date.now()-new Date(`${y}-${m}-${d}T${tp}:00Z`).getTime())/3600000;}
          const entryRef=sig.entry||currentPrice,atrMult=atr4H>0?Math.abs(currentPrice-entryRef)/atr4H:0;
          const inExtreme=sig.dir==="LONG"?rsiNow<35:rsiNow>65;
          const rsiExitPts=sig.dir==="LONG"?Math.max(0,rsiNow-35):Math.max(0,65-rsiNow);
          const rsiFav=sig.dir==="LONG"?rsiNow<rsiPrev:rsiNow>rsiPrev;
          let score=0;const vetoes=[],items=[];
          if(openPos>=3){vetoes.push("3 posiciones abiertas → VETO overtrading");return{verdict:"VETADO",vetoes,items,score:0,minScore:7,data:{btcPrice,btcEMA200,btcAbove,btcInCorr,currentPrice,rsiNow,rsiDir,atr4H,isRanging}};}
          if(sig.dir==="LONG"){if(!btcAbove){vetoes.push(`BTC ${btcPrice.toFixed(0)} bajo MM200 ${btcEMA200.toFixed(0)} → VETO LONGs`);}else if(btcInCorr){score+=2;items.push({k:"BTC a favor 1D",p:2,m:3,s:"PARCIAL",n:"Alcista pero EMA20<EMA50 → mín 8/10"});}else{score+=3;items.push({k:"BTC a favor 1D",p:3,m:3,s:"OK",n:`${btcPrice.toFixed(0)} sobre MM200 ✓`});}}
          else{if(!btcAbove){score+=3;items.push({k:"BTC a favor 1D",p:3,m:3,s:"OK",n:`Bajista ${btcPrice.toFixed(0)}<MM200 ✓`});}else{score+=1;items.push({k:"BTC a favor 1D",p:1,m:3,s:"PARCIAL",n:"BTC alcista — SHORT contrarian +1"});}}
          if(isRanging)vetoes.push(`EMAs entrelazadas 4H (${(Math.abs(ema20_4H-ema50_4H)/currentPrice*100).toFixed(2)}%) → Rango`);
          const bosAuto=sig.type==="SMT"?3:2;score+=bosAuto;
          items.push({k:"Estructura (bot detectó)",p:bosAuto,m:3,s:"OK",n:sig.type==="SMT"?`${sig.signal} detectado por SMT Pro ✓`:"Cruce de banda BMSB confirmado ✓"});
          if(sig.type==="SMT"){score+=2;items.push({k:"Rechazo en EMA",p:2,m:2,s:"OK",n:"SMT entrada en zona EMA ✓"});}
          else{score+=1;items.push({k:"Rechazo en EMA",p:1,m:2,s:"PARCIAL",n:"BMSB en banda de valor +1"});}
          if(inExtreme){score+=2;items.push({k:"RSI 4H",p:2,m:2,s:"OK",n:`${rsiNow.toFixed(1)} ${rsiDir} zona extrema ✓`});}
          else if(rsiExitPts<10){score+=1;items.push({k:"RSI 4H",p:1,m:2,s:"PENALIZADO",n:`${rsiNow.toFixed(1)} ${rsiDir} salió ${rsiExitPts.toFixed(0)}pts (-1)`});}
          else{if(!rsiFav){vetoes.push(`RSI 4H ${rsiNow.toFixed(1)} salió ${rsiExitPts.toFixed(0)}pts y gira en contra`);items.push({k:"RSI 4H",p:0,m:2,s:"VETO",n:`${rsiNow.toFixed(1)} momentum cambiado`});}else{score+=1;items.push({k:"RSI 4H",p:1,m:2,s:"PENALIZADO",n:`${rsiNow.toFixed(1)} salió pero favorable`});}}
          if(sig.entry){if(atrMult>=3){vetoes.push(`Agotamiento: ${atrMult.toFixed(1)}x ATR desde señal`);items.push({k:"Agotamiento ATR",p:-3,m:0,s:"VETO",n:`${atrMult.toFixed(1)}x ATR ≥3x = VETO`});}else if(atrMult>=2){score-=2;items.push({k:"Agotamiento ATR",p:-2,m:0,s:"PENALIZADO",n:`${atrMult.toFixed(1)}x ATR (-2pts)`});}else items.push({k:"Agotamiento ATR",p:0,m:0,s:"OK",n:`${atrMult.toFixed(1)}x ATR ✓`});}
          if(ageHours>4&&atrMult>1)vetoes.push(`Señal ${ageHours.toFixed(1)}h antigua y precio alejado — esperar retest`);
          const distMacro=Math.abs(currentPrice-ema200_4H)/currentPrice*100;
          if(distMacro>8){score+=1;items.push({k:"Espacio hasta macro",p:1,m:1,s:"OK",n:`${distMacro.toFixed(1)}% hasta EMA200 4H ✓`});}
          else items.push({k:"Espacio hasta macro",p:0,m:1,s:"NO",n:`Solo ${distMacro.toFixed(1)}% margen`});
          const minScore=btcInCorr?8:7;
          const verdict=vetoes.length>0?"VETADO":score>=minScore?"APROBADA":score+4>=minScore?"POSIBLE":"VETADO";
          const riskPct=mode==="Enfriamiento"?0.005:openPos>=2?0.0133:0.02,riskUSDT=capital*riskPct;
          let order=null;
          if(verdict!=="VETADO"){const entryP=sig.entry||currentPrice,slP=sig.sl||(sig.dir==="LONG"?entryP-atr4H*1.5:entryP+atr4H*1.5),slDist=Math.abs(entryP-slP)/entryP,leverage=Math.min(10,Math.max(1,+(riskPct/slDist).toFixed(1))),size=riskUSDT/slDist;order={entry:entryP,sl:slP,tp1:sig.tp1||(sig.dir==="LONG"?entryP+atr4H*1.5:entryP-atr4H*1.5),tp2:sig.tp2||(sig.dir==="LONG"?entryP+atr4H*2.25:entryP-atr4H*2.25),tp3:sig.tp3||(sig.dir==="LONG"?entryP+atr4H*3:entryP-atr4H*3),leverage,size:+size.toFixed(2),riskUSDT:+riskUSDT.toFixed(2),riskPct};}
          return{verdict,vetoes,items,score,minScore,data:{btcPrice,btcEMA200,btcAbove,btcInCorr,currentPrice,rsiNow,rsiDir,atr4H,isRanging},order};
        };

        const analyzeAlerta=async(sig,capital,openPos,mode)=>{
          const [pair4H,pair1H]=await Promise.all([fetchC(sig.pair,"4H",100),fetchC(sig.pair,"1H",100)]);
          const p4C=pair4H.map(c=>c.c),p1C=pair1H.map(c=>c.c),currentPrice=p4C.at(-1);
          const rsi4H=rsi(p4C).at(-1),rsi1H=rsi(p1C).at(-1),rsiDir4H=rsi4H>rsi(p4C).at(-2)?"↑":"↓";
          const atr4H_v=atr(pair4H),ema20_4H=ema(p4C,20).at(-1),ema50_4H=ema(p4C,50).at(-1);
          const ema20_1H=ema(p1C,20).at(-1),ema50_1H=ema(p1C,50).at(-1);
          const isRanging4H=Math.abs(ema20_4H-ema50_4H)/currentPrice*100<0.5;
          const isRanging1H=Math.abs(ema20_1H-ema50_1H)/currentPrice*100<0.5;
          const isRanging=isRanging4H||isRanging1H;
          const estructuraFavor=(sig.dir==="SHORT"&&ema20_4H<ema50_4H)||(sig.dir==="LONG"&&ema20_4H>ema50_4H);
          if(openPos>=3)return{verdict:"VETADO",vetoes:["3 posiciones abiertas"],items:[],score:0,minScore:7,data:{currentPrice,rsi4H,rsi1H,atr4H_v,isRanging}};
          let score=0;const vetoes=[],items=[];
          const btcFavor=(sig.dir==="LONG"&&sig.btcBias==="ALCISTA")||(sig.dir==="SHORT"&&sig.btcBias==="BAJISTA");
          if(btcFavor){score+=4;items.push({k:"BTC macro",p:4,m:4,s:"OK",n:`BTC ${sig.btcBias} coincide con ${sig.dir} ✓`});}
          else{vetoes.push(`BTC ${sig.btcBias} contradice ${sig.dir}`);items.push({k:"BTC macro",p:0,m:4,s:"VETO",n:`BTC ${sig.btcBias} opuesto a señal`});}
          const pts=sig.cumplidas>=3?3:sig.cumplidas===2?2:1;score+=pts;
          items.push({k:`Condiciones bot (${sig.cumplidas}/4)`,p:pts,m:3,s:sig.cumplidas>=2?"OK":"PARCIAL",n:sig.conditions.slice(0,2).join(", ")||"Ver mensaje"});
          if(sig.priority==="PRIORITARIA"){score+=1;items.push({k:"Alerta PRIORITARIA",p:1,m:1,s:"OK",n:"3-4 condiciones simultáneas +1"});}
          const inExtreme1H=sig.dir==="LONG"?rsi1H<40:rsi1H>60;
          if(inExtreme1H){score+=2;items.push({k:"RSI 1H",p:2,m:2,s:"OK",n:`${rsi1H.toFixed(1)} ${rsiDir4H} zona favorable ✓`});}
          else{score+=1;items.push({k:"RSI 1H",p:1,m:2,s:"PARCIAL",n:`${rsi1H.toFixed(1)} neutral +1`});}
          if(estructuraFavor){score+=1;items.push({k:"Estructura 4H",p:1,m:1,s:"OK",n:`EMA20 ${sig.dir==="SHORT"?"<":">"} EMA50 — estructura confirma ${sig.dir} ✓`});}
          else{score-=1;items.push({k:"Estructura 4H",p:-1,m:1,s:"PENALIZADO",n:`EMA20/EMA50 contradicen ${sig.dir} en 4H (-1)`});}
          if(isRanging4H)vetoes.push(`EMAs entrelazadas 4H (${(Math.abs(ema20_4H-ema50_4H)/currentPrice*100).toFixed(2)}%) → Rango 4H`);
          if(isRanging1H&&!isRanging4H)vetoes.push(`EMAs entrelazadas 1H (${(Math.abs(ema20_1H-ema50_1H)/currentPrice*100).toFixed(2)}%) → Rango en entrada`);
          const minScore=7,verdict=vetoes.length>0?"VETADO":score>=minScore?"APROBADA":"POSIBLE";
          const riskPct=mode==="Enfriamiento"?0.005:openPos>=2?0.0133:0.02,riskUSDT=capital*riskPct,slDist=atr4H_v/currentPrice;
          const leverage=Math.min(10,Math.max(1,+(riskPct/slDist).toFixed(1))),size=riskUSDT/slDist;
          const order={entry:currentPrice,sl:sig.dir==="LONG"?currentPrice-atr4H_v*1.5:currentPrice+atr4H_v*1.5,tp1:sig.dir==="LONG"?currentPrice+atr4H_v*1.5:currentPrice-atr4H_v*1.5,tp2:sig.dir==="LONG"?currentPrice+atr4H_v*2.25:currentPrice-atr4H_v*2.25,tp3:sig.dir==="LONG"?currentPrice+atr4H_v*3:currentPrice-atr4H_v*3,leverage,size:+size.toFixed(2),riskUSDT:+riskUSDT.toFixed(2),riskPct};
          return{verdict,vetoes,items,score,minScore,data:{currentPrice,rsi4H,rsi1H,rsiDir4H,atr4H_v,isRanging},order};
        };

        const PAIRS_16=["BTC","ETH","SOL","XRP","ADA","TAO","STX","SUI","NEAR","DOT","INJ","AAVE","AVAX","HBAR","POL","RUNE"];
        const scanPair=async(pair)=>{
          try{
            const [d1,h4]=await Promise.all([fetchC(pair,"1D",50),fetchC(pair,"4H",50)]);
            const c1=d1.map(c=>c.c),c4=h4.map(c=>c.c),p=c1.at(-1);
            const e200=ema(c1,200).at(-1),e50=ema(c1,50).at(-1),e20=ema(c1,20).at(-1);
            const r1D=rsi(c1).at(-1),r4H=rsi(c4).at(-1),a4H=atr(h4);
            const aboveEMA200=p>e200;let score=0;
            if(aboveEMA200)score+=20;if(r4H<35||r4H>65)score+=30;
            const distEMA=Math.min(Math.abs(p-e20),Math.abs(p-e50))/p*100;
            if(distEMA<1)score+=30;const ranging=Math.abs(e20-e50)/p*100<0.5;if(!ranging)score+=20;
            return{pair,price:p,ema200:e200,rsi1D:r1D.toFixed(1),rsi4H:r4H.toFixed(1),atr:a4H,dir:aboveEMA200?"LONG":"SHORT",score,ranging,distEMA:distEMA.toFixed(2)};
          }catch{return null;}
        };

        const uid=()=>Math.random().toString(36).slice(2,9);
        const f=(n,dec)=>{if(n==null||isNaN(n))return"—";const d=dec!=null?dec:n<0.01?6:n<1?4:n<100?4:2;return n.toFixed(d);};
        const C={bg:"#080B14",card:"#0F1827",border:"#1E293B",gold:"#F0A500",green:"#2ECC71",red:"#E74C3C",blue:"#3498DB",orange:"#E67E22",gray:"#6B7280",text:"#E8EAF0"};
        const VC={APROBADA:C.green,POSIBLE:C.orange,VETADO:C.red};
        const VI={APROBADA:"✅",POSIBLE:"⚠️",VETADO:"🚫"};
        const Card=({children,style={}})=><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12,...style}}>{children}</div>;
        const Title=({children})=><div style={{color:C.gold,fontSize:11,fontWeight:700,letterSpacing:2,marginBottom:12}}>{children}</div>;
        const Row=({k,v,vc})=><div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1A2235"}}><span style={{color:C.gray,fontSize:11}}>{k}</span><span style={{color:vc||C.text,fontWeight:600,fontSize:12}}>{v}</span></div>;
        const Pill=({c,children})=><span style={{background:c+"22",color:c,borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:700,marginLeft:4}}>{children}</span>;
        const Btn=({onClick,children,color=C.gold,disabled=false,style={}})=><button onClick={onClick} disabled={disabled} style={{background:disabled?"#333":color,border:"none",borderRadius:6,padding:"10px 14px",color:color===C.gold?"#080B14":"#fff",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:disabled?"not-allowed":"letterSpacing:1",...style}}>{children}</button>;
        const ScoreItem=({item})=>{const col={OK:C.green,VETO:C.red,PENALIZADO:C.orange,PARCIAL:C.gold,PENDIENTE:C.gray,NO:C.red};return<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}><div><div style={{color:col[item.s]||C.gray,fontWeight:600,fontSize:12}}>{item.k}</div><div style={{color:C.gray,fontSize:11,marginTop:2}}>{item.n}</div></div><div style={{color:col[item.s]||C.gray,fontWeight:700,fontSize:14,minWidth:30,textAlign:"right"}}>{item.p===null?"⏳":item.p>0?`+${item.p}`:item.p<0?item.p:"✓"}{item.m>0&&item.p!==null&&<span style={{opacity:.4,fontSize:10}}>/{item.m}</span>}</div></div>;};

        const SignalResult=({result,sig,onAddPos})=>{
          const vc=VC[result.verdict]||C.gray;
          const [showOrder,setShowOrder]=useState(false);
          return <div style={{background:C.card,border:`2px solid ${vc}`,borderRadius:10,padding:14,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div><span style={{fontWeight:700,color:C.gold,fontSize:14}}>{sig.pair}</span><Pill c={sig.dir==="LONG"?C.green:C.red}>{sig.dir}</Pill><Pill c={C.blue}>{sig.type}</Pill>{sig.priority&&<Pill c={sig.priority==="PRIORITARIA"?C.red:C.orange}>{sig.priority}</Pill>}</div>
              <div style={{textAlign:"right"}}><div style={{color:vc,fontWeight:700,fontSize:16}}>{VI[result.verdict]} {result.verdict}</div><div style={{color:C.gray,fontSize:11}}>{result.score}/{result.minScore} pts</div></div>
            </div>
            {result.vetoes.length>0&&<div style={{background:"#1E0A0A",borderRadius:6,padding:8,marginBottom:8}}>{result.vetoes.map((v,i)=><div key={i} style={{color:C.red,fontSize:11}}>🚫 {v}</div>)}</div>}
            <div style={{background:"#0A0F1A",borderRadius:6,padding:8,marginBottom:8}}>
              {[["Precio actual",f(result.data.currentPrice)],["RSI 4H",`${(result.data.rsiNow||result.data.rsi4H||0).toFixed(1)} ${result.data.rsiDir||result.data.rsiDir4H||""}`],["ATR 4H",f(result.data.atr4H||result.data.atr4H_v)],["Ranging",result.data.isRanging?"⚠️ Sí":"✅ No"]].map(([k,v])=><Row key={k} k={k} v={v}/>)}
            </div>
            {result.items.map((item,i)=><ScoreItem key={i} item={item}/>)}
            {result.verdict!=="VETADO"&&result.order&&<>
              <Btn onClick={()=>setShowOrder(!showOrder)} color={C.green} style={{width:"100%",marginTop:10}}>{showOrder?"Ocultar orden":"📋 Ver orden de entrada"}</Btn>
              {showOrder&&<div style={{marginTop:10,background:"#0A0F1A",borderRadius:8,padding:10}}>
                {[["Entrada",f(result.order.entry),C.gold],["Stop Loss",f(result.order.sl),C.red],["TP1 (50%)",f(result.order.tp1),C.green],["TP2 (25%)",f(result.order.tp2),C.green],["TP3 (25%)",f(result.order.tp3),C.green],["Apalancamiento",`${result.order.leverage}x`,result.order.leverage>=8?C.red:result.order.leverage>=5?C.orange:C.green],["Tamaño",`${result.order.size} USDT`],["Riesgo",`${(result.order.riskPct*100).toFixed(1)}% = ${result.order.riskUSDT.toFixed(2)} USDT`]].map(([k,v,vc])=><Row key={k} k={k} v={v} vc={vc}/>)}
                <Btn onClick={()=>onAddPos(sig,result)} color="#27AE60" style={{width:"100%",marginTop:10}}>⚡ Abrir posición</Btn>
              </div>}
            </>}
          </div>;
        };

        function App() {
          const [tab,setTab]=useState("analisis"); // Abro en análisis por defecto para que pruebes rápido
          const [raw,setRaw]=useState("");
          const [capital,setCapital]=useState("200");
          const [openPos,setOpenPos]=useState("0");
          const [mode,setMode]=useState("Normal");
          const [parsed,setParsed]=useState([]);
          const [results,setResults]=useState([]);
          const [loading,setLoading]=useState(false);
          const [btcStatus,setBtcStatus]=useState(null);
          const [positions,setPositions]=useState([]);
          const [diary,setDiary]=useState([]);
          const [scanner,setScanner]=useState([]);
          const [scanning,setScanning]=useState(false);
          const [priceTick,setPriceTick]=useState({});
          const [parseError,setParseError]=useState("");

          useEffect(()=>{
            try{const p=localStorage.getItem("pos_v3");if(p)setPositions(JSON.parse(p));}catch{}
            try{const d=localStorage.getItem("diary_v3");if(d)setDiary(JSON.parse(d));}catch{}
            loadBTC();
          },[]);

          useEffect(()=>{
            if(!positions.length)return;
            const iv=setInterval(async()=>{const t={};for(const p of positions){try{t[p.pair]=await fetchPrice(p.pair);}catch{}}setPriceTick(t);},30000);
            return()=>clearInterval(iv);
          },[positions]);

          const savePos=(p)=>{setPositions(p);try{localStorage.setItem("pos_v3",JSON.stringify(p));}catch{}};
          const saveDiary=(d)=>{setDiary(d);try{localStorage.setItem("diary_v3",JSON.stringify(d));}catch{}};

          const loadBTC=async()=>{
            try{const cs=await fetchC("BTC","1D",250);const cl=cs.map(c=>c.c);const e200=ema(cl,200).at(-1),e20=ema(cl,20).at(-1),e50=ema(cl,50).at(-1),p=cl.at(-1),r=rsi(cl).at(-1);setBtcStatus({price:p,ema200:e200,above:p>e200,inCorr:p>e200&&e20<e50,rsi:r.toFixed(1)});}
            catch{setBtcStatus({error:true});}
          };

          const handleParse=()=>{
            setParseError("");
            setResults([]);
            const sigs=parseMessages(raw);
            if(!sigs.length){
                setParseError("No se reconoció ningún mensaje. Comprueba que copiaste el texto completo.");
                return;
            }
            setParsed(sigs);
          };

          const handleAnalyze=async()=>{
            if(!parsed.length)return;
            setLoading(true);setResults([]);
            const cap=parseFloat(capital)||200,op=parseInt(openPos)||0,res=[];
            for(const sig of parsed){
                try{
                    const r=sig.type==="ALERTA"?await analyzeAlerta(sig,cap,op,mode):await analyzeSenal(sig,cap,op,mode);
                    res.push({sig,result:r});
                }catch(e){
                    res.push({sig,result:{verdict:"VETADO",vetoes:[`Error de red/API: ${e.message}`],items:[],score:0,minScore:7,data:{}}});
                }
            }
            setResults(res);setLoading(false);
          };

          const runScanner = async () => {
            setScanning(true);
            const res = [];
            for (const p of PAIRS_16) {
              const r = await scanPair(p);
              if (r) res.push(r);
            }
            res.sort((a, b) => b.score - a.score);
            setScanner(res);
            setScanning(false);
          };

          const addPos = (sig, result) => {
            const p = {
              id: uid(),
              pair: sig.pair,
              dir: sig.dir,
              entry: result.order.entry,
              sl: result.order.sl,
              tp1: result.order.tp1,
              tp2: result.order.tp2,
              tp3: result.order.tp3,
              size: result.order.size,
              lev: result.order.leverage,
              risk: result.order.riskUSDT,
              status: "OPEN",
              ts: Date.now()
            };
            const updatedPos = [p, ...positions];
            savePos(updatedPos);
            alert(`Posición añadida: ${sig.pair} ${sig.dir}`);
          };

          const closePos = (id, pnlStr, closedAtStr) => {
            const pnl = parseFloat(pnlStr);
            const closedAt = parseFloat(closedAtStr);
            if (isNaN(pnl) || isNaN(closedAt)) { alert("Valores inválidos"); return; }
            
            const updatedPos = positions.map(p => {
              if (p.id === id) {
                const closedEntry = { ...p, status: "CLOSED", pnl, closedAt, closeTs: Date.now() };
                const updatedDiary = [closedEntry, ...diary];
                saveDiary(updatedDiary);
                return null;
              }
              return p;
            }).filter(Boolean);
            savePos(updatedPos);
          };

          const renderRadar = () => (
            <div>
              <Card>
                <Title>ESTADO DE BITCOIN (1D)</Title>
                {btcStatus ? (
                  btcStatus.error ? <div style={{color: C.red}}>Error cargando BTC</div> :
                  <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                    <div>
                      <div style={{fontSize: 20, fontWeight: 'bold', color: btcStatus.above ? C.green : C.red}}>
                        ${f(btcStatus.price, 0)} {btcStatus.above ? "▲" : "▼"}
                      </div>
                      <div style={{color: C.gray, fontSize: 12}}>RSI: {btcStatus.rsi}</div>
                    </div>
                    <div style={{textAlign: 'right'}}>
                      <div style={{color: C.gray, fontSize: 12}}>EMA 200: ${f(btcStatus.ema200, 0)}</div>
                      <Pill c={btcStatus.above ? C.green : C.red}>{btcStatus.above ? "ALCISTA" : "BAJISTA"}</Pill>
                      {btcStatus.inCorr && <Pill c={C.orange}>CORRECCIÓN</Pill>}
                    </div>
                  </div>
                ) : <div style={{color: C.gray}}>Cargando BTC...</div>}
              </Card>

              <Card>
                <Title>ESCÁNER DE OPORTUNIDADES</Title>
                <Btn onClick={runScanner} disabled={scanning} style={{width: '100%', marginBottom: 15}}>
                  {scanning ? "Escaneando mercado..." : "🔍 Escanear Top 16 Pares"}
                </Btn>
                {scanner.length > 0 && (
                  <div style={{background: '#0A0F1A', borderRadius: 8, padding: 10}}>
                    <div style={{display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', color: C.gray, fontSize: 10, marginBottom: 8, borderBottom: `1px solid ${C.border}`, paddingBottom: 4}}>
                      <div>PAR</div><div>RSI 4H</div><div>DIST EMA</div><div>SCORE</div>
                    </div>
                    {scanner.map((s, i) => (
                      <div key={i} style={{display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', padding: '6px 0', borderBottom: `1px solid #1A2235`, alignItems: 'center'}}>
                        <div>
                          <span style={{fontWeight: 'bold', color: C.text, fontSize: 12}}>{s.pair}</span>
                          <span style={{color: s.dir === 'LONG' ? C.green : C.red, fontSize: 10, marginLeft: 6}}>{s.dir}</span>
                        </div>
                        <div style={{color: s.rsi4H < 35 || s.rsi4H > 65 ? C.gold : C.gray, fontSize: 11}}>{s.rsi4H}</div>
                        <div style={{color: s.distEMA < 1 ? C.green : C.gray, fontSize: 11}}>{s.distEMA}%</div>
                        <div style={{fontWeight: 'bold', color: s.score >= 50 ? C.green : s.score >= 30 ? C.orange : C.gray, fontSize: 12}}>{s.score}</div>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            </div>
          );

          const renderAnalisis = () => (
            <div>
              <Card>
                <Title>INGRESAR SEÑALES (Telegram)</Title>
                <textarea 
                  value={raw} 
                  onChange={(e) => setRaw(e.target.value)} 
                  placeholder="Pega aquí los mensajes del bot. Ahora puedes pegar varios a la vez..." 
                  style={{width: '100%', height: 120, background: '#0A0F1A', border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, padding: 10, fontFamily: 'monospace', fontSize: 12, resize: 'vertical', marginBottom: 10}}
                />
                {parseError && <div style={{color: C.red, fontSize: 11, marginBottom: 10}}>{parseError}</div>}
                
                <div style={{display: 'flex', gap: 10, marginBottom: 15}}>
                  <Btn onClick={handleParse} style={{flex: 1}} color={C.blue}>1. Extraer Datos</Btn>
                  <Btn onClick={handleAnalyze} disabled={!parsed.length || loading} style={{flex: 1, background: (!parsed.length || loading) ? '#333' : '#F0A500', color: '#080B14'}}>
                    {loading ? "Analizando..." : "2. Analizar"}
                  </Btn>
                </div>

                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10}}>
                  <div>
                    <div style={{color: C.gray, fontSize: 10, marginBottom: 4}}>Capital ($)</div>
                    <input type="number" value={capital} onChange={e=>setCapital(e.target.value)} style={{width: '100%', background: '#0A0F1A', border: `1px solid ${C.border}`, color: C.text, padding: '6px 10px', borderRadius: 4}} />
                  </div>
                  <div>
                    <div style={{color: C.gray, fontSize: 10, marginBottom: 4}}>Posiciones Abiertas</div>
                    <input type="number" value={openPos} onChange={e=>setOpenPos(e.target.value)} style={{width: '100%', background: '#0A0F1A', border: `1px solid ${C.border}`, color: C.text, padding: '6px 10px', borderRadius: 4}} />
                  </div>
                  <div>
                    <div style={{color: C.gray, fontSize: 10, marginBottom: 4}}>Modo Riesgo</div>
                    <select value={mode} onChange={e=>setMode(e.target.value)} style={{width: '100%', background: '#0A0F1A', border: `1px solid ${C.border}`, color: C.text, padding: '6px', borderRadius: 4}}>
                      <option>Normal</option>
                      <option>Enfriamiento</option>
                    </select>
                  </div>
                </div>
              </Card>

              {parsed.length > 0 && results.length === 0 && (
                <div style={{color: C.blue, fontSize: 12, textAlign: 'center', padding: 10}}>
                  Se encontraron {parsed.length} señales. Pulsa "Analizar".
                </div>
              )}

              {results.map((r, i) => <SignalResult key={i} result={r.result} sig={r.sig} onAddPos={addPos} />)}
            </div>
          );

          const renderPortfolio = () => (
            <div>
              <Card style={{marginBottom: 15}}>
                <Title>POSICIONES ACTIVAS ({positions.length})</Title>
                {positions.length === 0 ? <div style={{color: C.gray, fontSize: 12, textAlign: 'center'}}>No hay posiciones abiertas</div> : 
                  positions.map((p) => {
                    const currentPrice = priceTick[p.pair] || p.entry;
                    const isLong = p.dir === 'LONG';
                    const pnlPct = ((currentPrice - p.entry) / p.entry) * (isLong ? 1 : -1) * 100 * p.lev;
                    const isProfit = pnlPct >= 0;

                    return (
                      <div key={p.id} style={{background: '#0A0F1A', borderRadius: 8, padding: 12, marginBottom: 10, borderLeft: `3px solid ${isLong ? C.green : C.red}`}}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8}}>
                          <div>
                            <span style={{fontWeight: 'bold', fontSize: 14, color: C.text}}>{p.pair}</span>
                            <span style={{color: isLong ? C.green : C.red, fontSize: 11, marginLeft: 6}}>{p.dir} {p.lev}x</span>
                          </div>
                          <div style={{fontWeight: 'bold', color: isProfit ? C.green : C.red}}>
                            {pnlPct > 0 ? "+" : ""}{pnlPct.toFixed(2)}%
                          </div>
                        </div>
                        <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, fontSize: 11, color: C.gray, marginBottom: 10}}>
                          <div>Entrada: <span style={{color: C.text}}>{f(p.entry)}</span></div>
                          <div>Actual: <span style={{color: C.text}}>{priceTick[p.pair] ? f(priceTick[p.pair]) : "Cargando..."}</span></div>
                          <div>SL: <span style={{color: C.red}}>{f(p.sl)}</span></div>
                          <div>Riesgo: <span style={{color: C.text}}>${p.risk.toFixed(2)}</span></div>
                        </div>
                        <div style={{display: 'flex', gap: 10}}>
                          <input type="number" id={`closePrice_${p.id}`} placeholder="Precio Cierre" style={{flex: 1, background: C.card, border: `1px solid ${C.border}`, color: C.text, padding: 6, borderRadius: 4, fontSize: 11}} />
                          <input type="number" id={`pnl_${p.id}`} placeholder="PnL ($)" style={{flex: 1, background: C.card, border: `1px solid ${C.border}`, color: C.text, padding: 6, borderRadius: 4, fontSize: 11}} />
                          <Btn color={C.blue} style={{padding: '6px 12px'}} onClick={() => {
                            const cp = document.getElementById(`closePrice_${p.id}`).value;
                            const pnl = document.getElementById(`pnl_${p.id}`).value;
                            if(cp && pnl) closePos(p.id, pnl, cp);
                            else alert("Introduce Precio de Cierre y PnL");
                          }}>Cerrar</Btn>
                        </div>
                      </div>
                    );
                  })
                }
              </Card>

              <Card>
                <Title>DIARIO DE TRADING (Historial)</Title>
                {diary.length === 0 ? <div style={{color: C.gray, fontSize: 12, textAlign: 'center'}}>El diario está vacío</div> : 
                  <div style={{maxHeight: 300, overflowY: 'auto', paddingRight: 5}}>
                    {diary.map((d, i) => (
                      <div key={i} style={{background: '#0A0F1A', borderRadius: 6, padding: 10, marginBottom: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                        <div>
                          <div style={{fontWeight: 'bold', fontSize: 12, color: C.text}}>{d.pair} <span style={{color: d.dir==='LONG'?C.green:C.red, fontSize: 10}}>{d.dir}</span></div>
                          <div style={{color: C.gray, fontSize: 10}}>{new Date(d.closeTs).toLocaleDateString()}</div>
                        </div>
                        <div style={{fontWeight: 'bold', fontSize: 14, color: d.pnl >= 0 ? C.green : C.red}}>
                          {d.pnl >= 0 ? "+" : ""}{d.pnl.toFixed(2)}$
                        </div>
                      </div>
                    ))}
                  </div>
                }
              </Card>
            </div>
          );

          return (
            <div style={{maxWidth: 480, margin: '0 auto', minHeight: '100vh', display: 'flex', flexDirection: 'column'}}>
              <div style={{background: C.card, padding: '15px 20px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                <span style={{fontSize: 20, marginRight: 10}}>⚡</span>
                <span style={{color: C.gold, fontWeight: 900, letterSpacing: 1, fontSize: 18}}>SMT TRADING BOT v3</span>
              </div>

              <div style={{flex: 1, padding: 15, overflowY: 'auto', paddingBottom: 80}}>
                {tab === 'radar' && renderRadar()}
                {tab === 'analisis' && renderAnalisis()}
                {tab === 'portfolio' && renderPortfolio()}
              </div>

              <div style={{background: C.card, borderTop: `1px solid ${C.border}`, display: 'flex', padding: '10px 5px', position: 'fixed', bottom: 0, width: '100%', maxWidth: 480, zIndex: 100}}>
                {[
                  { id: 'radar', icon: '📡', label: 'Radar' },
                  { id: 'analisis', icon: '🧠', label: 'Análisis' },
                  { id: 'portfolio', icon: '💼', label: 'Portfolio' }
                ].map(t => (
                  <div 
                    key={t.id} 
                    onClick={() => setTab(t.id)}
                    style={{flex: 1, textAlign: 'center', cursor: 'pointer', opacity: tab === t.id ? 1 : 0.5, transition: '0.2s'}}
                  >
                    <div style={{fontSize: 20, marginBottom: 4}}>{t.icon}</div>
                    <div style={{fontSize: 10, fontWeight: 700, color: tab === t.id ? C.gold : C.text}}>{t.label}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
